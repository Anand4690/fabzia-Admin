<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Add Promo Code – Fabzia Admin</title>
    <meta name="description" content="Create and configure a new promo code with offer details, validity dates, and discount amounts." />

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts: Inter + Roboto -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!-- Utility CSS (design tokens) -->
    <link rel="stylesheet" href="utility.css" />

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              "app-bg":          "hsl(0,0%,96%)",
              "app-heading":     "#1a1a1a",
              "app-text":        "rgba(15,15,15,1)",
              "app-sub":         "rgba(77,77,77,1)",
              "app-placeholder": "rgba(171,171,171,1)",
              "app-border":      "#d7d7d7",
              "app-icon":        "#4d4d4d",
              "app-btn":         "#125dcd",
            },
            fontFamily: {
              inter:  ["Inter",  "sans-serif"],
              roboto: ["Roboto", "sans-serif"],
            },
          },
        },
      };
    </script>

    <style>
      /* ── Animations ── */
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-4px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in { animation: fadeIn 0.18s ease-out forwards; }

      /* ── Bottom sheet slide-up ── */
      @keyframes slideUp {
        from { transform: translateY(100%); opacity: 0; }
        to   { transform: translateY(0);   opacity: 1; }
      }
      @keyframes slideDown {
        from { transform: translateY(0);   opacity: 1; }
        to   { transform: translateY(100%); opacity: 0; }
      }
      .sheet-enter { animation: slideUp   0.3s cubic-bezier(0.32, 0.72, 0, 1) forwards; }
      .sheet-exit  { animation: slideDown 0.25s cubic-bezier(0.32, 0.72, 0, 1) forwards; }

      /* ── Backdrop fade ── */
      @keyframes backdropIn  { from { opacity: 0; } to { opacity: 1; } }
      @keyframes backdropOut { from { opacity: 1; } to { opacity: 0; } }
      .backdrop-enter { animation: backdropIn  0.3s ease forwards; }
      .backdrop-exit  { animation: backdropOut 0.25s ease forwards; }

      /* ── Scrollbar hide ── */
      .scrollbar-hide::-webkit-scrollbar { display: none; }
      .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

      /* ── Bottom padding so sticky button never covers content ── */
      .form-scroll-area { padding-bottom: 96px; }

      /* ── Focus border ── */
      input:focus, textarea:focus { border-color: #1a1a1a !important; outline: none; }

      /* ── Calendar grid ── */
      .cal-day {
        width: 36px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        font-size: 14px;
        font-family: 'Roboto', sans-serif;
        cursor: pointer;
        transition: background 0.15s;
      }
      .cal-day:hover:not(.cal-empty):not(.cal-disabled) {
        background: #eef4fd;
      }
      .cal-day.cal-selected {
        background: #125dcd;
        color: #fff;
        font-weight: 600;
      }
      .cal-day.cal-today:not(.cal-selected) {
        border: 1.5px solid #125dcd;
        color: #125dcd;
        font-weight: 600;
      }
      .cal-day.cal-disabled { color: #d7d7d7; cursor: default; }
      .cal-day.cal-empty    { cursor: default; }
    </style>
  </head>

  <body class="flex justify-center min-h-screen" style="background:hsl(0,0%,96%)">

    <!-- ── Outer wrapper (max 430 px) ── -->
    <div id="app" class="w-full max-w-[430px] min-h-screen flex flex-col relative" style="background:hsl(0,0%,96%)">

      <!-- ── Sticky Nav Bar ── -->
      <div class="sticky top-0 z-30 flex items-center gap-2 px-1 py-2 border-b border-app-border bg-white h-16">
        <button
          onclick="window.location.href='home.html'"
          aria-label="Go back"
          class="w-12 h-12 flex items-center justify-center shrink-0 rounded-full active:bg-gray-100 transition-colors"
        >
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path fill-rule="evenodd" clip-rule="evenodd"
              d="M16.966 5.25L10.216 12L16.966 18.75L15.375 20.341L7.034 12L15.375 3.659L16.966 5.25Z"
              fill="#1A1A1A"/>
          </svg>
        </button>
        <span class="font-inter text-[18px] font-normal leading-[28px] tracking-[0.04px] text-app-heading">
          Add Promo Code
        </span>
      </div>

      <!-- ── Scrollable Form ── -->
      <div class="flex flex-col gap-4 px-5 pt-5 form-scroll-area">

        <!-- Offer Name -->
        <div class="flex flex-col gap-2">
          <label for="field-offerName" class="font-inter text-[14px] font-semibold leading-[160%] tracking-[0.04px] text-app-heading">
            Offer Name
          </label>
          <input
            id="field-offerName"
            type="text"
            placeholder="Offer Name"
            onfocus="scrollToField(this)"
            class="w-full h-[52px] px-3 rounded-[8px] border border-app-border font-roboto text-[16px] font-normal leading-[24px] tracking-[0.5px] text-app-text placeholder:text-app-placeholder bg-white transition-colors"
          />
        </div>

        <!-- Offer Code -->
        <div class="flex flex-col gap-2">
          <label for="field-offerCode" class="font-inter text-[14px] font-semibold leading-[160%] tracking-[0.04px] text-app-heading">
            Offer Code
          </label>
          <input
            id="field-offerCode"
            type="text"
            placeholder="Offer Code"
            onfocus="scrollToField(this)"
            class="w-full h-[52px] px-3 rounded-[8px] border border-app-border font-roboto text-[16px] font-normal leading-[24px] tracking-[0.5px] text-app-text placeholder:text-app-placeholder bg-white transition-colors"
          />
        </div>

        <!-- Offer Description -->
        <div class="flex flex-col gap-2">
          <label for="field-offerDesc" class="font-inter text-[14px] font-semibold leading-[160%] tracking-[0.04px] text-app-heading">
            Offer Description
          </label>
          <textarea
            id="field-offerDesc"
            placeholder="Description"
            rows="4"
            onfocus="scrollToField(this)"
            class="w-full px-3 py-3 rounded-[8px] border border-app-border font-roboto text-[16px] font-normal leading-[24px] tracking-[0.5px] text-app-text placeholder:text-app-placeholder bg-white transition-colors resize-none"
          ></textarea>
        </div>

        <!-- Offer Start Date -->
        <div class="flex flex-col gap-2">
          <label class="font-inter text-[14px] font-semibold leading-[160%] tracking-[0.04px] text-app-heading">
            Offer Start date
          </label>
          <button
            id="btn-startDate"
            type="button"
            onclick="openCalendar('start')"
            class="w-full flex items-center justify-between h-[52px] px-3 rounded-[8px] border border-app-border bg-white transition-colors"
          >
            <span id="label-startDate" class="font-roboto text-[16px] font-normal leading-[24px] tracking-[0.5px] text-app-placeholder">
              Select date
            </span>
            <!-- Calendar Icon -->
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="shrink-0 text-app-icon">
              <path d="M8 2V5M16 2V5M3.5 9.09H20.5M21 8.5V17C21 20 19.5 22 16 22H8C4.5 22 3 20 3 17V8.5C3 5.5 4.5 3.5 8 3.5H16C19.5 3.5 21 5.5 21 8.5Z" stroke="#4D4D4D" stroke-width="1.5" stroke-miterlimit="10" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M15.6947 13.7H15.7037M15.6947 16.7H15.7037M11.9955 13.7H12.0045M11.9955 16.7H12.0045M8.29431 13.7H8.30329M8.29431 16.7H8.30329" stroke="#4D4D4D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>

        <!-- Offer End Date -->
        <div class="flex flex-col gap-2">
          <label class="font-inter text-[14px] font-semibold leading-[160%] tracking-[0.04px] text-app-heading">
            Offer End date
          </label>
          <button
            id="btn-endDate"
            type="button"
            onclick="openCalendar('end')"
            class="w-full flex items-center justify-between h-[52px] px-3 rounded-[8px] border border-app-border bg-white transition-colors"
          >
            <span id="label-endDate" class="font-roboto text-[16px] font-normal leading-[24px] tracking-[0.5px] text-app-placeholder">
              Select date
            </span>
            <!-- Calendar Icon -->
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="shrink-0 text-app-icon">
              <path d="M8 2V5M16 2V5M3.5 9.09H20.5M21 8.5V17C21 20 19.5 22 16 22H8C4.5 22 3 20 3 17V8.5C3 5.5 4.5 3.5 8 3.5H16C19.5 3.5 21 5.5 21 8.5Z" stroke="#4D4D4D" stroke-width="1.5" stroke-miterlimit="10" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M15.6947 13.7H15.7037M15.6947 16.7H15.7037M11.9955 13.7H12.0045M11.9955 16.7H12.0045M8.29431 13.7H8.30329M8.29431 16.7H8.30329" stroke="#4D4D4D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>

        <!-- Redeem Count -->
        <div class="flex flex-col gap-2">
          <label for="field-redeemCount" class="font-inter text-[14px] font-semibold leading-[160%] tracking-[0.04px] text-app-heading">
            Redeem Count
          </label>
          <input
            id="field-redeemCount"
            type="text"
            inputmode="numeric"
            placeholder="Redeem Count"
            onfocus="scrollToField(this)"
            class="w-full h-[52px] px-3 rounded-[8px] border border-app-border font-roboto text-[16px] font-normal leading-[24px] tracking-[0.5px] text-app-text placeholder:text-app-placeholder bg-white transition-colors"
          />
        </div>

        <!-- Turf Specific -->
        <div class="flex flex-col gap-2">
          <label for="field-turfSpecific" class="font-inter text-[14px] font-semibold leading-[160%] tracking-[0.04px] text-app-heading">
            Turf Specific
          </label>
          <input
            id="field-turfSpecific"
            type="text"
            placeholder="Turf Specific"
            onfocus="scrollToField(this)"
            class="w-full h-[52px] px-3 rounded-[8px] border border-app-border font-roboto text-[16px] font-normal leading-[24px] tracking-[0.5px] text-app-text placeholder:text-app-placeholder bg-white transition-colors"
          />
        </div>

        <!-- Offer Amount -->
        <div class="flex flex-col gap-2">
          <label for="field-offerAmount" class="font-inter text-[14px] font-semibold leading-[160%] tracking-[0.04px] text-app-heading">
            Offer Amount
          </label>
          <input
            id="field-offerAmount"
            type="text"
            inputmode="decimal"
            placeholder="Amount"
            onfocus="scrollToField(this)"
            class="w-full h-[52px] px-3 rounded-[8px] border border-app-border font-roboto text-[16px] font-normal leading-[24px] tracking-[0.5px] text-app-text placeholder:text-app-placeholder bg-white transition-colors"
          />
        </div>

        <!-- Min. Cart Amount for Offer -->
        <div class="flex flex-col gap-2">
          <label for="field-minCart" class="font-inter text-[14px] font-semibold leading-[160%] tracking-[0.04px] text-app-heading">
            Min. Cart Amount for Offer
          </label>
          <input
            id="field-minCart"
            type="text"
            inputmode="decimal"
            placeholder="Amount"
            onfocus="scrollToField(this)"
            class="w-full h-[52px] px-3 rounded-[8px] border border-app-border font-roboto text-[16px] font-normal leading-[24px] tracking-[0.5px] text-app-text placeholder:text-app-placeholder bg-white transition-colors"
          />
        </div>

        <!-- Max Offer Amount -->
        <div class="flex flex-col gap-2">
          <label for="field-maxOffer" class="font-inter text-[14px] font-semibold leading-[160%] tracking-[0.04px] text-app-heading">
            Max Offer Amount
          </label>
          <input
            id="field-maxOffer"
            type="text"
            inputmode="decimal"
            placeholder="Amount"
            onfocus="scrollToField(this)"
            class="w-full h-[52px] px-3 rounded-[8px] border border-app-border font-roboto text-[16px] font-normal leading-[24px] tracking-[0.5px] text-app-text placeholder:text-app-placeholder bg-white transition-colors"
          />
        </div>

        <!-- No. of Hours Booked -->
        <div class="flex flex-col gap-2">
          <label for="field-hoursBooked" class="font-inter text-[14px] font-semibold leading-[160%] tracking-[0.04px] text-app-heading">
            No. of Hours Booked
          </label>
          <input
            id="field-hoursBooked"
            type="text"
            inputmode="numeric"
            placeholder="Hours"
            onfocus="scrollToField(this)"
            class="w-full h-[52px] px-3 rounded-[8px] border border-app-border font-roboto text-[16px] font-normal leading-[24px] tracking-[0.5px] text-app-text placeholder:text-app-placeholder bg-white transition-colors"
          />
        </div>

      </div><!-- /form-scroll-area -->

      <!-- ── Sticky Bottom Button ── -->
      <div class="sticky bottom-0 z-30 w-full px-5 py-4 border-t border-app-border bg-white">
        <button
          id="btn-confirm"
          type="button"
          onclick="handleConfirm()"
          class="w-full h-[52px] bg-app-btn text-white rounded-[8px] font-inter text-[16px] font-semibold leading-[24px] tracking-[0.04px] active:opacity-90 transition-opacity"
        >
          Confirm
        </button>
      </div>

    </div><!-- /app -->

    <!-- ══════════════════════════════════════════════════════
         CALENDAR BOTTOM SHEET
    ══════════════════════════════════════════════════════ -->
    <!-- Backdrop -->
    <div
      id="cal-backdrop"
      class="hidden fixed inset-0 z-40 bg-black/40"
      onclick="closeCalendar()"
    ></div>

    <!-- Sheet -->
    <div
      id="cal-sheet"
      class="hidden fixed bottom-0 left-0 right-0 z-50 w-full max-w-[430px] mx-auto bg-white rounded-t-2xl shadow-2xl overflow-hidden"
      style="padding-bottom: env(safe-area-inset-bottom, 0px);"
    >
      <!-- Drag handle -->
      <div class="flex justify-center pt-3 pb-1">
        <div class="w-10 h-1 rounded-full bg-gray-200"></div>
      </div>

      <!-- Sheet header -->
      <div class="flex items-center justify-between px-5 py-3 border-b border-app-border">
        <span id="cal-sheet-title" class="font-inter text-[16px] font-semibold text-app-heading">Select Start Date</span>
        <button onclick="closeCalendar()" class="w-8 h-8 flex items-center justify-center text-app-icon rounded-full active:bg-gray-100 transition-colors">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M18 6L6 18M6 6L18 18" stroke="#4D4D4D" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <!-- Month navigator -->
      <div class="flex items-center justify-between px-5 py-4">
        <button
          id="cal-prev"
          onclick="changeMonth(-1)"
          class="w-9 h-9 flex items-center justify-center rounded-full active:bg-gray-100 transition-colors"
        >
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path fill-rule="evenodd" clip-rule="evenodd"
              d="M15.966 5.25L9.216 12L15.966 18.75L14.375 20.341L6.034 12L14.375 3.659L15.966 5.25Z"
              fill="#1A1A1A"/>
          </svg>
        </button>
        <span id="cal-month-label" class="font-inter text-[16px] font-semibold text-app-heading"></span>
        <button
          id="cal-next"
          onclick="changeMonth(1)"
          class="w-9 h-9 flex items-center justify-center rounded-full active:bg-gray-100 transition-colors"
        >
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path fill-rule="evenodd" clip-rule="evenodd"
              d="M8.034 5.25L14.784 12L8.034 18.75L9.625 20.341L17.966 12L9.625 3.659L8.034 5.25Z"
              fill="#1A1A1A"/>
          </svg>
        </button>
      </div>

      <!-- Day headers -->
      <div class="grid grid-cols-7 px-4 pb-2">
        <template id="cal-day-header-tmpl">
        </template>
        <div class="cal-weekday-header"></div>
      </div>
      <div id="cal-day-headers" class="grid grid-cols-7 px-4 pb-2">
        <!-- Injected by JS -->
      </div>

      <!-- Day grid -->
      <div id="cal-grid" class="grid grid-cols-7 gap-y-1 px-4 pb-4">
        <!-- Injected by JS -->
      </div>

      <!-- Confirm button -->
      <div class="px-5 pb-5 pt-2">
        <button
          id="cal-confirm-btn"
          onclick="confirmCalendar()"
          class="w-full h-[52px] bg-app-btn text-white rounded-[8px] font-inter text-[16px] font-semibold active:opacity-90 transition-opacity disabled:opacity-40"
          disabled
        >
          Confirm Date
        </button>
      </div>
    </div>

    <script>
      /* ═══════════════════════════════════════════════
         STATE
      ═══════════════════════════════════════════════ */
      let calTarget  = null;          // 'start' | 'end'
      let calViewDate = new Date();   // month being displayed
      let calSelected = null;         // Date selected in picker (temp)

      const startDate = { value: null, label: null };
      const endDate   = { value: null, label: null };

      const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
      const DAYS   = ["Su","Mo","Tu","We","Th","Fr","Sa"];

      /* ═══════════════════════════════════════════════
         SCROLL TO FIELD
      ═══════════════════════════════════════════════ */
      function scrollToField(el) {
        setTimeout(() => {
          el.scrollIntoView({ behavior: "smooth", block: "center" });
        }, 320);
      }

      /* ═══════════════════════════════════════════════
         FORMAT DATE  →  "12th Jan 25"
      ═══════════════════════════════════════════════ */
      function formatDate(d) {
        const day = d.getDate();
        const suffix = ["th","st","nd","rd"][
          day % 10 <= 3 && (day < 11 || day > 13) ? day % 10 : 0
        ];
        const mon = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][d.getMonth()];
        const yr  = String(d.getFullYear()).slice(-2);
        return `${day}${suffix} ${mon} ${yr}`;
      }

      /* ═══════════════════════════════════════════════
         OPEN / CLOSE CALENDAR
      ═══════════════════════════════════════════════ */
      function openCalendar(target) {
        calTarget = target;

        // Pre-select existing value if set
        const existing = target === 'start' ? startDate.value : endDate.value;
        calSelected = existing ? new Date(existing) : null;
        calViewDate = calSelected ? new Date(calSelected.getFullYear(), calSelected.getMonth(), 1)
                                  : new Date(new Date().getFullYear(), new Date().getMonth(), 1);

        // Update sheet title
        document.getElementById('cal-sheet-title').textContent =
          target === 'start' ? 'Select Start Date' : 'Select End Date';

        // Confirm button state
        document.getElementById('cal-confirm-btn').disabled = !calSelected;

        renderCalendar();

        const backdrop = document.getElementById('cal-backdrop');
        const sheet    = document.getElementById('cal-sheet');
        backdrop.classList.remove('hidden');
        sheet.classList.remove('hidden');
        // Trigger animation
        backdrop.classList.remove('backdrop-exit');
        sheet.classList.remove('sheet-exit');
        backdrop.classList.add('backdrop-enter');
        sheet.classList.add('sheet-enter');
      }

      function closeCalendar() {
        const backdrop = document.getElementById('cal-backdrop');
        const sheet    = document.getElementById('cal-sheet');
        backdrop.classList.remove('backdrop-enter');
        sheet.classList.remove('sheet-enter');
        backdrop.classList.add('backdrop-exit');
        sheet.classList.add('sheet-exit');
        setTimeout(() => {
          backdrop.classList.add('hidden');
          sheet.classList.add('hidden');
          backdrop.classList.remove('backdrop-exit');
          sheet.classList.remove('sheet-exit');
        }, 260);
      }

      function confirmCalendar() {
        if (!calSelected) return;
        const formatted = formatDate(calSelected);
        if (calTarget === 'start') {
          startDate.value = calSelected;
          startDate.label = formatted;
          const lbl = document.getElementById('label-startDate');
          lbl.textContent = formatted;
          lbl.style.color = 'rgba(15,15,15,1)';
        } else {
          endDate.value = calSelected;
          endDate.label = formatted;
          const lbl = document.getElementById('label-endDate');
          lbl.textContent = formatted;
          lbl.style.color = 'rgba(15,15,15,1)';
        }
        closeCalendar();
      }

      /* ═══════════════════════════════════════════════
         MONTH NAVIGATION
      ═══════════════════════════════════════════════ */
      function changeMonth(delta) {
        calViewDate.setMonth(calViewDate.getMonth() + delta);
        renderCalendar();
      }

      /* ═══════════════════════════════════════════════
         RENDER CALENDAR
      ═══════════════════════════════════════════════ */
      function renderCalendar() {
        const year  = calViewDate.getFullYear();
        const month = calViewDate.getMonth();

        // Month label
        document.getElementById('cal-month-label').textContent = `${MONTHS[month]} ${year}`;

        // Day headers
        const headersEl = document.getElementById('cal-day-headers');
        headersEl.innerHTML = DAYS.map(d =>
          `<div class="flex items-center justify-center h-8 font-inter text-[12px] font-semibold text-app-placeholder">${d}</div>`
        ).join('');

        // Grid
        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const today = new Date();
        today.setHours(0, 0, 0, 0);

        const grid = document.getElementById('cal-grid');
        grid.innerHTML = '';

        // Empty cells before first day
        for (let i = 0; i < firstDay; i++) {
          const empty = document.createElement('div');
          empty.className = 'cal-day cal-empty';
          grid.appendChild(empty);
        }

        // Day cells
        for (let d = 1; d <= daysInMonth; d++) {
          const dt = new Date(year, month, d);
          dt.setHours(0, 0, 0, 0);

          const isToday    = dt.getTime() === today.getTime();
          const isSelected = calSelected && dt.getTime() === new Date(calSelected.getFullYear(), calSelected.getMonth(), calSelected.getDate()).getTime();

          const classes = [
            'cal-day',
            isSelected ? 'cal-selected' : '',
            isToday && !isSelected ? 'cal-today' : '',
            'text-app-heading',
          ].filter(Boolean).join(' ');

          const cell = document.createElement('div');
          cell.className = classes;
          cell.textContent = d;
          cell.onclick = () => selectDay(year, month, d);
          grid.appendChild(cell);
        }
      }

      function selectDay(year, month, day) {
        calSelected = new Date(year, month, day);
        calSelected.setHours(0, 0, 0, 0);

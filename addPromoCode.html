<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Add Promo Code - Fabzia Admin</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="utility.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              "app-bg":          "hsl(0,0%,96%)",
              "app-heading":     "#1a1a1a",
              "app-text":        "rgba(15,15,15,1)",
              "app-sub":         "rgba(77,77,77,1)",
              "app-placeholder": "rgba(171,171,171,1)",
              "app-border":      "#d7d7d7",
              "app-icon":        "#4d4d4d",
              "app-btn":         "#125dcd",
            },
            fontFamily: {
              inter:  ["Inter",  "sans-serif"],
              roboto: ["Roboto", "sans-serif"],
            },
          },
        },
      };
    </script>
    
    <style>
        .form-scroll-area { padding-bottom: 96px; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* BOTTOM SHEETS */
        .bs-overlay { position:fixed; inset:0; z-index:100; background:rgba(0,0,0,0.45); display:none; align-items:flex-end; justify-content:center; }
        .bs-overlay.open { display:flex; }
        .bs-panel { position:relative; width:100%; max-width:430px; background:#fff; border-radius:20px 20px 0 0; animation:bsSlideUp 0.3s cubic-bezier(0.4,0,0.2,1); max-height: 80vh; display: flex; flex-direction: column; }
        @keyframes bsSlideUp { from { transform:translateY(100%); } to { transform:translateY(0); } }
        
        .chip { display: inline-flex; align-items: center; gap: 4px; padding: 4px 12px; background: #eef4fd; color: #125dcd; border-radius: 16px; font-size: 14px; font-weight: 500; font-family: 'Inter', sans-serif;}
        
        .radio-btn { width:24px; height:24px; border-radius:50%; border:1.5px solid #d7d7d7; display:flex; align-items:center; justify-content:center; }
        .radio-btn.active { border-color:#125dcd; background:#125dcd; }
        .radio-btn.active::after { content:''; width:8px; height:8px; border-radius:50%; background:#fff; }
        
        .check-box { width:24px; height:24px; border-radius:4px; border:1.5px solid #d7d7d7; display:flex; align-items:center; justify-content:center; cursor: pointer; transition: all 0.2s; }
        .check-box.active { border-color:#125dcd; background:#125dcd; }
        
        /* Inline Calendar */
        .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; margin-top:12px; }
        .cal-cell { text-align:center; padding:8px 4px; font-size:14px; cursor:pointer; border-radius:8px; color: #1a1a1a; font-weight: 500; transition: all 0.15s; font-family: 'Roboto', sans-serif;}
        .cal-cell.selected { background:#125dcd; color:#fff; }
        .cal-cell.other-month { color:#ababab; }
        
        /* Time Grid */
        .time-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:12px; max-height: 250px; overflow-y: auto; padding-right: 4px; }
        .time-cell { text-align:center; padding:10px 4px; font-size:14px; cursor:pointer; border-radius:8px; border: 1px solid #d7d7d7; color: #1a1a1a; font-weight: 500; font-family: 'Roboto', sans-serif;}
        .time-cell.selected { background:#125dcd; border-color:#125dcd; color:#fff; }

        /* Disable Number Input Arrows */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        
        input:focus, textarea:focus { border-color: #1a1a1a !important; outline: none; }
    </style>
</head>
<body class="bg-app-bg flex justify-center min-h-screen">
    
    <div id="app" class="w-full max-w-[430px] min-h-screen flex flex-col relative bg-white">
        
        <!-- Top Navigation -->
        <div class="sticky top-0 z-30 flex items-center gap-2 px-1 py-2 border-b border-app-border bg-white h-16">
            <button onclick="window.location.href='home.html'" aria-label="Go back" class="w-12 h-12 flex items-center justify-center shrink-0 rounded-full active:bg-gray-100 transition-colors">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path fill-rule="evenodd" clip-rule="evenodd"
                    d="M16.966 5.25L10.216 12L16.966 18.75L15.375 20.341L7.034 12L15.375 3.659L16.966 5.25Z"
                    fill="#1A1A1A"/>
                </svg>
            </button>
            <span class="font-inter text-[18px] font-normal leading-[28px] tracking-[0.04px] text-app-heading">
                Add Promo Code
            </span>
        </div>

        <!-- Form Section -->
        <div class="flex-1 flex flex-col px-5 pt-5 form-scroll-area overflow-y-auto no-scrollbar">
            <div class="flex flex-col gap-4">
                
                <!-- User Wise -->
                <div class="flex flex-col gap-2 w-full relative">
                    <div class="flex flex-col gap-1 items-start">
                        <label class="font-inter text-[14px] font-semibold leading-[160%] tracking-[0.04px] text-app-heading">User Wise</label>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" id="all-users-checkbox" checked onchange="toggleUserWise()" class="w-4 h-4 accent-app-btn cursor-pointer">
                            <span class="text-[14px] text-app-sub font-medium font-inter">Allowed for all users</span>
                        </label>
                    </div>
                    <div id="user-wise-container" class="hidden flex-col gap-2 w-full">
                        <div class="flex items-center gap-2 relative">
                            <input type="text" id="user-input" oninput="showUserSuggestions()" placeholder="Enter User id" class="h-[52px] px-3 rounded-[8px] border border-app-border font-roboto text-[16px] font-normal leading-[24px] tracking-[0.5px] text-app-text placeholder:text-app-placeholder bg-white transition-colors flex-1">
                            <button type="button" onclick="addUser()" class="h-[52px] px-5 bg-app-btn text-white rounded-[8px] font-inter text-[16px] font-semibold active:opacity-90 transition-opacity">
                                Add
                            </button>
                            <!-- Suggestions Dropdown -->
                            <div id="user-suggestions" class="absolute top-[56px] left-0 right-[80px] bg-white border border-app-border rounded-lg shadow-lg z-50 hidden max-h-[200px] overflow-y-auto">
                            </div>
                        </div>
                        <div id="user-chips-container" class="flex flex-wrap gap-2 mt-1 empty:hidden"></div>
                    </div>
                </div>

                <!-- Turf Wise -->
                <div class="flex flex-col gap-2 w-full">
                    <div class="flex flex-col gap-1 items-start">
                        <label class="font-inter text-[14px] font-semibold leading-[160%] tracking-[0.04px] text-app-heading">Turf Wise</label>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" id="all-turf-checkbox" checked onchange="toggleTurfWise()" class="w-4 h-4 accent-app-btn cursor-pointer">
                            <span class="text-[14px] text-app-sub font-medium font-inter">Allowed for all Turf</span>
                        </label>
                    </div>
                    <div id="turf-wise-container" class="hidden border border-app-border flex items-center px-3 h-[52px] rounded-[8px] w-full bg-white relative cursor-pointer" onclick="openBS('turf-select')">
                        <input type="text" id="turf-display" readonly placeholder="Select Turf" class="w-full h-full font-roboto text-[16px] font-normal text-app-text outline-none bg-transparent placeholder:text-app-placeholder pointer-events-none border-none focus:ring-0 cursor-pointer">
                        <div class="absolute right-3 pointer-events-none text-app-icon">
                            <i data-lucide="chevron-down" class="w-5 h-5"></i>
                        </div>
                    </div>
                </div>

                <!-- Day Wise -->
                <div class="flex flex-col gap-2 w-full">
                    <label class="font-inter text-[14px] font-semibold leading-[160%] tracking-[0.04px] text-app-heading">Day Wise</label>
                    <div class="border border-app-border flex items-center px-3 h-[52px] rounded-[8px] w-full bg-white relative cursor-pointer" onclick="openBS('day-type')">
                        <input type="text" id="day-wise-display" readonly placeholder="Select Days" class="w-full h-full font-roboto text-[16px] font-normal text-app-text outline-none bg-transparent placeholder:text-app-placeholder pointer-events-none border-none focus:ring-0 cursor-pointer">
                        <div class="absolute right-3 pointer-events-none text-app-icon">
                            <i data-lucide="chevron-down" class="w-5 h-5"></i>
                        </div>
                    </div>
                </div>

                <!-- Time Settings -->
                <div class="flex flex-col gap-3 w-full">
                    <label class="font-inter text-[14px] font-semibold leading-[160%] tracking-[0.04px] text-app-heading">Time Settings</label>
                    
                    <!-- Peak Hours -->
                    <div class="w-full">
                        <label class="text-[13px] text-app-sub font-semibold font-inter mb-2 block">Peak Hours</label>
                        <div class="flex items-center gap-2">
                            <div class="flex-1 border border-app-border rounded-[8px] h-[52px] flex items-center px-3 cursor-pointer bg-white" onclick="openPureTimePicker('peak-start')">
                                <input type="text" id="peak-start-display" readonly placeholder="Start Time" class="w-full font-roboto text-[15px] font-normal text-app-text bg-transparent outline-none pointer-events-none text-center placeholder:text-app-placeholder">
                            </div>
                            <span class="text-app-placeholder font-medium text-[14px] font-inter">to</span>
                            <div class="flex-1 border border-app-border rounded-[8px] h-[52px] flex items-center px-3 cursor-pointer bg-white" onclick="openPureTimePicker('peak-end')">
                                <input type="text" id="peak-end-display" readonly placeholder="End Time" class="w-full font-roboto text-[15px] font-normal text-app-text bg-transparent outline-none pointer-events-none text-center placeholder:text-app-placeholder">
                            </div>
                        </div>
                    </div>

                    <!-- Non-Peak Hours -->
                    <div class="w-full mt-2">
                        <label class="text-[13px] text-app-sub font-semibold font-inter mb-2 block">Non-Peak Hours</label>
                        <div class="flex items-center gap-2">
                            <div class="flex-1 border border-app-border rounded-[8px] h-[52px] flex items-center px-3 cursor-pointer bg-white" onclick="openPureTimePicker('nonpeak-start')">
                                <input type="text" id="nonpeak-start-display" readonly placeholder="Start Time" class="w-full font-roboto text-[15px] font-normal text-app-text bg-transparent outline-none pointer-events-none text-center placeholder:text-app-placeholder">
                            </div>
                            <span class="text-app-placeholder font-medium text-[14px] font-inter">to</span>
                            <div class="flex-1 border border-app-border rounded-[8px] h-[52px] flex items-center px-3 cursor-pointer bg-white" onclick="openPureTimePicker('nonpeak-end')">
                                <input type="text" id="nonpeak-end-display" readonly placeholder="End Time" class="w-full font-roboto text-[15px] font-normal text-app-text bg-transparent outline-none pointer-events-none text-center placeholder:text-app-placeholder">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Coupon Name -->
                <div class="flex flex-col gap-2 w-full mt-2">
                    <label class="font-inter text-[14px] font-semibold leading-[160%] tracking-[0.04px] text-app-heading">Coupon Name</label>
                    <input type="text" placeholder="Coupon Name" class="w-full h-[52px] px-3 rounded-[8px] border border-app-border font-roboto text-[16px] font-normal leading-[24px] tracking-[0.5px] text-app-text placeholder:text-app-placeholder bg-white transition-colors">
                </div>

                <!-- Coupon Code -->
                <div class="flex flex-col gap-2 w-full">
                    <label class="font-inter text-[14px] font-semibold leading-[160%] tracking-[0.04px] text-app-heading">Coupon Code</label>
                    <input type="text" placeholder="Coupon Code" class="w-full h-[52px] px-3 rounded-[8px] border border-app-border font-roboto text-[16px] font-normal leading-[24px] tracking-[0.5px] text-app-text placeholder:text-app-placeholder bg-white uppercase transition-colors">
                </div>

                <!-- Coupon Description -->
                <div class="flex flex-col gap-2 w-full">
                    <label class="font-inter text-[14px] font-semibold leading-[160%] tracking-[0.04px] text-app-heading">Coupon Description</label>
                    <textarea placeholder="Description" rows="4" class="w-full p-3 rounded-[8px] border border-app-border font-roboto text-[16px] font-normal leading-[24px] tracking-[0.5px] text-app-text placeholder:text-app-placeholder bg-white resize-none transition-colors"></textarea>
                </div>

                <!-- Discount Type -->
                <div class="flex flex-col gap-2 w-full">
                    <label class="font-inter text-[14px] font-semibold leading-[160%] tracking-[0.04px] text-app-heading">Discount Type</label>
                    <div class="flex flex-col gap-3">
                        <label class="border border-app-border flex items-center gap-3 px-3 py-2 h-[52px] rounded-[8px] w-full bg-white cursor-pointer focus-within:border-app-btn transition-colors">
                            <input type="radio" name="discount_type" value="flat" checked onchange="updateDiscountSymbol()" class="w-5 h-5 accent-app-btn cursor-pointer">
                            <span class="text-app-sub text-[16px] font-roboto">Flat</span>
                        </label>
                        <label class="border border-app-border flex items-center gap-3 px-3 py-2 h-[52px] rounded-[8px] w-full bg-white cursor-pointer focus-within:border-app-btn transition-colors">
                            <input type="radio" name="discount_type" value="percentage" onchange="updateDiscountSymbol()" class="w-5 h-5 accent-app-btn cursor-pointer">
                            <span class="text-app-sub text-[16px] font-roboto">Percentage</span>
                        </label>
                    </div>
                </div>

                <!-- Discount Value -->
                <div class="flex flex-col gap-2 w-full">
                    <label class="font-inter text-[14px] font-semibold leading-[160%] tracking-[0.04px] text-app-heading">Discount Value</label>
                    <div class="border border-app-border flex items-center px-3 h-[52px] rounded-[8px] w-full bg-white gap-2 transition-colors focus-within:border-app-btn focus-within:ring-1 focus-within:ring-app-btn">
                        <span id="discount-symbol" class="text-[16px] text-app-sub font-medium border-r border-app-border pr-2 w-[30px] text-center">₹</span>
                        <input id="discount-amount-input" type="number" min="0" oninput="validateAmount(this)" placeholder="Amount" class="w-full h-full font-roboto text-[16px] outline-none text-app-text bg-transparent placeholder:text-app-placeholder border-none focus:ring-0">
                    </div>
                </div>

                <!-- Minimum Amount for Discount -->
                <div class="flex flex-col gap-2 w-full">
                    <label class="font-inter text-[14px] font-semibold leading-[160%] tracking-[0.04px] text-app-heading">Minimum Amount for Discount</label>
                    <div class="border border-app-border flex items-center px-3 h-[52px] rounded-[8px] w-full bg-white gap-2 transition-colors focus-within:border-app-btn focus-within:ring-1 focus-within:ring-app-btn">
                        <span class="text-[16px] text-app-sub font-medium border-r border-app-border pr-2 w-[30px] text-center">₹</span>
                        <input type="number" min="0" oninput="if(this.value < 0) this.value = Math.abs(this.value);" placeholder="Amount" class="w-full h-full font-roboto text-[16px] outline-none text-app-text bg-transparent placeholder:text-app-placeholder border-none focus:ring-0">
                    </div>
                </div>

                <!-- Maximum Amount for Discount -->
                <div class="flex flex-col gap-2 w-full">
                    <label class="font-inter text-[14px] font-semibold leading-[160%] tracking-[0.04px] text-app-heading">Maximum Amount for Discount</label>
                    <div class="border border-app-border flex items-center px-3 h-[52px] rounded-[8px] w-full bg-white gap-2 transition-colors focus-within:border-app-btn focus-within:ring-1 focus-within:ring-app-btn">
                        <span class="text-[16px] text-app-sub font-medium border-r border-app-border pr-2 w-[30px] text-center">₹</span>
                        <input type="number" min="0" oninput="if(this.value < 0) this.value = Math.abs(this.value);" placeholder="Amount" class="w-full h-full font-roboto text-[16px] outline-none text-app-text bg-transparent placeholder:text-app-placeholder border-none focus:ring-0">
                    </div>
                </div>

                <!-- Max Redeem Count -->
                <div class="flex flex-col gap-2 w-full">
                    <label class="font-inter text-[14px] font-semibold leading-[160%] tracking-[0.04px] text-app-heading">Max Redeem Count</label>
                    <input type="number" min="0" oninput="if(this.value < 0) this.value = Math.abs(this.value);" placeholder="Redeem Count" class="w-full h-[52px] px-3 rounded-[8px] border border-app-border font-roboto text-[16px] font-normal leading-[24px] tracking-[0.5px] text-app-text placeholder:text-app-placeholder bg-white transition-colors focus:border-app-btn focus:ring-1 focus:ring-app-btn">
                </div>

                <!-- Minimum No. of Slot -->
                <div class="flex flex-col gap-2 w-full">
                    <label class="font-inter text-[14px] font-semibold leading-[160%] tracking-[0.04px] text-app-heading">Minimum No. of Slot</label>
                    <input type="number" min="1" max="100" placeholder="Slots" class="w-full h-[52px] px-3 rounded-[8px] border border-app-border font-roboto text-[16px] font-normal leading-[24px] tracking-[0.5px] text-app-text placeholder:text-app-placeholder bg-white transition-colors focus:border-app-btn focus:ring-1 focus:ring-app-btn">
                </div>

                <!-- Coupon Start Date -->
                <div class="flex flex-col gap-2 w-full">
                    <label class="font-inter text-[14px] font-semibold leading-[160%] tracking-[0.04px] text-app-heading">Start Date</label>
                    <div class="border border-app-border flex items-center justify-between px-3 h-[52px] rounded-[8px] w-full bg-white relative cursor-pointer" onclick="openDateSelect('coupon-start')">
                        <input type="text" id="coupon-start-date-display" readonly placeholder="Select Date" class="w-full h-full font-roboto text-[16px] text-app-text outline-none bg-transparent placeholder:text-app-placeholder pointer-events-none border-none focus:ring-0 cursor-pointer">
                        <div class="pointer-events-none text-app-icon shrink-0">
                            <!-- Using standard calendar icon to match design system -->
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="shrink-0 text-app-icon">
                              <path d="M8 2V5M16 2V5M3.5 9.09H20.5M21 8.5V17C21 20 19.5 22 16 22H8C4.5 22 3 20 3 17V8.5C3 5.5 4.5 3.5 8 3.5H16C19.5 3.5 21 5.5 21 8.5Z" stroke="#4D4D4D" stroke-width="1.5" stroke-miterlimit="10" stroke-linecap="round" stroke-linejoin="round"/>
                              <path d="M15.6947 13.7H15.7037M15.6947 16.7H15.7037M11.9955 13.7H12.0045M11.9955 16.7H12.0045M8.29431 13.7H8.30329M8.29431 16.7H8.30329" stroke="#4D4D4D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </div>
                    </div>
                </div>

                <!-- Coupon End Date -->
                <div class="flex flex-col gap-2 w-full">
                    <label class="font-inter text-[14px] font-semibold leading-[160%] tracking-[0.04px] text-app-heading">End Date</label>
                    <div class="border border-app-border flex items-center justify-between px-3 h-[52px] rounded-[8px] w-full bg-white relative cursor-pointer" onclick="openDateSelect('coupon-end')">
                        <input type="text" id="coupon-end-date-display" readonly placeholder="Select Date" class="w-full h-full font-roboto text-[16px] text-app-text outline-none bg-transparent placeholder:text-app-placeholder pointer-events-none border-none focus:ring-0 cursor-pointer">
                        <div class="pointer-events-none text-app-icon shrink-0">
                            <!-- Using standard calendar icon to match design system -->
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="shrink-0 text-app-icon">
                              <path d="M8 2V5M16 2V5M3.5 9.09H20.5M21 8.5V17C21 20 19.5 22 16 22H8C4.5 22 3 20 3 17V8.5C3 5.5 4.5 3.5 8 3.5H16C19.5 3.5 21 5.5 21 8.5Z" stroke="#4D4D4D" stroke-width="1.5" stroke-miterlimit="10" stroke-linecap="round" stroke-linejoin="round"/>
                              <path d="M15.6947 13.7H15.7037M15.6947 16.7H15.7037M11.9955 13.7H12.0045M11.9955 16.7H12.0045M8.29431 13.7H8.30329M8.29431 16.7H8.30329" stroke="#4D4D4D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </div>
                    </div>
                </div>

                <!-- Coupon Start Time -->
                <div class="flex flex-col gap-2 w-full">
                    <label class="font-inter text-[14px] font-semibold leading-[160%] tracking-[0.04px] text-app-heading">Start Time</label>
                    <div class="border border-app-border flex items-center justify-between px-3 h-[52px] rounded-[8px] w-full bg-white relative cursor-pointer" onclick="openPureTimePicker('coupon-start-time')">
                        <input type="text" id="coupon-start-time-display" readonly placeholder="Select Time" class="w-full h-full font-roboto text-[16px] text-app-text outline-none bg-transparent placeholder:text-app-placeholder pointer-events-none border-none focus:ring-0 cursor-pointer">
                        <div class="pointer-events-none text-app-icon shrink-0">
                            <i data-lucide="clock" class="w-5 h-5"></i>
                        </div>
                    </div>
                </div>

                <!-- Coupon End Time -->
                <div class="flex flex-col gap-2 w-full">
                    <label class="font-inter text-[14px] font-semibold leading-[160%] tracking-[0.04px] text-app-heading">End Time</label>
                    <div class="border border-app-border flex items-center justify-between px-3 h-[52px] rounded-[8px] w-full bg-white relative cursor-pointer" onclick="openPureTimePicker('coupon-end-time')">
                        <input type="text" id="coupon-end-time-display" readonly placeholder="Select Time" class="w-full h-full font-roboto text-[16px] text-app-text outline-none bg-transparent placeholder:text-app-placeholder pointer-events-none border-none focus:ring-0 cursor-pointer">
                        <div class="pointer-events-none text-app-icon shrink-0">
                            <i data-lucide="clock" class="w-5 h-5"></i>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <!-- Sticky Bottom Action Buttons -->
        <!-- Replacing with robust sticky bottom design consistent with other pages -->
        <div class="sticky bottom-0 z-30 w-full px-5 py-4 border-t border-app-border bg-white">
            <div class="flex items-center gap-3">
                <button onclick="showCancelPopup()" class="flex-1 flex justify-center items-center rounded-[8px] h-[52px] text-app-heading font-inter font-semibold text-[16px] border border-app-border bg-white active:bg-gray-50 transition-colors">
                    Cancel
                </button>
                <button onclick="showSuccessToaster()" class="flex-1 flex justify-center items-center rounded-[8px] h-[52px] bg-app-btn text-white font-inter font-semibold text-[16px] active:opacity-90 transition-opacity">
                    Save Coupon
                </button>
            </div>
        </div>
        
    </div>

    <!-- ═══════════════════════════════════════
         BOTTOM SHEETS
    ═══════════════════════════════════════ -->

    <!-- Turf Selection Sheet -->
    <div id="bs-turf-select" class="bs-overlay" onclick="closeBS('turf-select')">

                        No

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
        });

        /* Discount Input Restrictions */
        function validateAmount(input) {
            if(input.value < 0) {
                input.value = Math.abs(input.value);
            }
            const isPercentage = document.querySelector('input[name="discount_type"][value="percentage"]').checked;
            if (isPercentage && input.value > 100) {
                input.value = 100;
            }
        }
        function updateDiscountSymbol() {
            const isPercentage = document.querySelector('input[name="discount_type"][value="percentage"]').checked;
            const symbolEl = document.getElementById('discount-symbol');
            const inputEl = document.getElementById('discount-amount-input');
            if (isPercentage) {
                symbolEl.textContent = '%';
                if(inputEl.value > 100) inputEl.value = 100;
            } else {
                symbolEl.textContent = '₹';
            }
        }

        /* 1. User Add logic */
        function toggleUserWise() {
            const checkbox = document.getElementById('all-users-checkbox');
            const container = document.getElementById('user-wise-container');
            if (checkbox.checked) {
                container.classList.add('hidden');
                container.classList.remove('flex');
            } else {
                container.classList.remove('hidden');
                container.classList.add('flex');
            }
        }

        const dummyUsers = [
            { id: 'USR001', name: 'John Doe' },
            { id: 'USR002', name: 'Jane Smith' },
            { id: 'USR003', name: 'Alice Johnson' },
            { id: 'USR004', name: 'Bob Brown' },
            { id: 'USR005', name: 'Charlie Davis' }
        ];

        function showUserSuggestions() {
            const input = document.getElementById('user-input');
            const val = input.value.trim().toLowerCase();
            const suggestionsEl = document.getElementById('user-suggestions');
            
            if (!val) {
                suggestionsEl.classList.add('hidden');
                return;
            }
            
            const matches = dummyUsers.filter(u => u.id.toLowerCase().includes(val) || u.name.toLowerCase().includes(val));
            
            if (matches.length > 0) {
                suggestionsEl.innerHTML = matches.map(u => `
                    <div class="px-4 py-3 hover:bg-gray-50 cursor-pointer border-b last:border-0 border-app-border" onclick="selectUserSuggestion('${u.id}')">
                        <div class="text-[14px] font-medium text-app-heading font-inter">${u.name}</div>
                        <div class="text-[12px] text-app-placeholder font-roboto">${u.id}</div>
                    </div>
                `).join('');
                suggestionsEl.classList.remove('hidden');
            } else {
                suggestionsEl.innerHTML = `<div class="px-4 py-3 text-[14px] text-app-placeholder font-inter text-center">No users found</div>`;
                suggestionsEl.classList.remove('hidden');
            }
        }

        function selectUserSuggestion(id) {
            document.getElementById('user-input').value = id;
            document.getElementById('user-suggestions').classList.add('hidden');
        }
        
        // Hide suggestions on outside click
        document.addEventListener('click', (e) => {
            if (!e.target.closest('#user-wise-container')) {
                const sugg = document.getElementById('user-suggestions');
                if(sugg) sugg.classList.add('hidden');
            }
        });

        function addUser() {
            const input = document.getElementById('user-input');
            const val = input.value.trim();
            if(!val) return;
            
            const container = document.getElementById('user-chips-container');
            const chip = document.createElement('div');
            chip.className = 'chip';
            chip.innerHTML = `
                <span>${val}</span>
                <button onclick="this.parentElement.remove()" class="flex items-center justify-center p-0.5 ml-1">
                    <i data-lucide="x" class="w-3 h-3 text-app-btn"></i>
                </button>
            `;
            container.appendChild(chip);
            input.value = '';
            document.getElementById('user-suggestions').classList.add('hidden');
            lucide.createIcons();
        }

        /* 2. Turf Selection */
        function toggleTurfWise() {
            const checkbox = document.getElementById('all-turf-checkbox');
            const container = document.getElementById('turf-wise-container');
            if (checkbox.checked) {
                container.classList.add('hidden');
            } else {
                container.classList.remove('hidden');
            }
        }

        const turfs = [
            { name: 'Fabzia Arena', frequent: true },
            { name: 'Skyline Sports Turf', frequent: false },
            { name: 'Green Park Turf', frequent: true },
            { name: 'Urban Kick Arena', frequent: false },
            { name: 'Olympia Turf', frequent: false },
            { name: 'City Kickers', frequent: true }
        ];
        const selectedTurfs = new Set();
        
        function renderTurfs() {
            const list = document.getElementById('turf-list');
            const searchInput = document.getElementById('turf-search');
            const searchQ = searchInput ? searchInput.value.toLowerCase() : '';
            list.innerHTML = '';
            
            let filteredTurfs = turfs.filter(t => t.name.toLowerCase().includes(searchQ));
            let frequentTurfs = filteredTurfs.filter(t => t.frequent).sort((a,b) => a.name.localeCompare(b.name));
            let otherTurfs = filteredTurfs.filter(t => !t.frequent).sort((a,b) => a.name.localeCompare(b.name));
            
            if (frequentTurfs.length > 0) {
                const head = document.createElement('div');
                head.className = 'px-3 py-2 text-[13px] font-semibold text-app-sub uppercase tracking-wider font-inter';
                head.innerText = 'Frequently Searched';
                list.appendChild(head);
                frequentTurfs.forEach(t => list.appendChild(createTurfEl(t.name)));
            }
            if (otherTurfs.length > 0) {
                const head = document.createElement('div');
                head.className = 'px-3 py-2 text-[13px] font-semibold text-app-sub uppercase tracking-wider mt-2 font-inter';
                head.innerText = 'All Turfs';
                list.appendChild(head);
                otherTurfs.forEach(t => list.appendChild(createTurfEl(t.name)));
            }
            if (filteredTurfs.length === 0) {
                list.innerHTML = `<div class="p-4 text-center text-app-placeholder text-[14px] font-inter">No turfs found</div>`;
            }
            lucide.createIcons();
        }
        
        function createTurfEl(turfName) {
            const isSelected = selectedTurfs.has(turfName);
            const el = document.createElement('div');
            el.className = 'flex items-center justify-between px-3 py-3 hover:bg-gray-50 cursor-pointer rounded-lg mb-1';
            el.onclick = () => {
                if (selectedTurfs.has(turfName)) selectedTurfs.delete(turfName);
                else selectedTurfs.add(turfName);
                renderTurfs();
            };
            el.innerHTML = `
                <span class="text-[15px] text-app-text font-medium font-roboto">${turfName}</span>
                <div class="check-box ${isSelected ? 'active' : ''}">
                    ${isSelected ? '<i data-lucide="check" class="w-4 h-4 text-white"></i>' : ''}
                </div>
            `;
            return el;
        }

        function applyTurfSelect() {
            const display = document.getElementById('turf-display');
            display.value = selectedTurfs.size === 0 ? '' : selectedTurfs.size === 1 ? Array.from(selectedTurfs)[0] : `${selectedTurfs.size} Turfs Selected`;
            closeBS('turf-select');
        }
        renderTurfs();

        /* Day Wise Logic */
        const dayOptions = [
            { id: 'all', label: 'All Days' },
            { id: 'weekdays', label: 'Weekdays (Mon - Fri)' },
            { id: 'weekends', label: 'Weekends (Sat - Sun)' },
            { id: 'custom_days', label: 'Custom days' }
        ];
        let currentDayOption = '';
        function renderDayType() {
            const list = document.getElementById('day-type-list');
            list.innerHTML = '';
            dayOptions.forEach(opt => {
                const isSelected = currentDayOption === opt.id;
                const el = document.createElement('div');
                el.className = 'flex items-center gap-3 px-1 py-3 cursor-pointer mb-2';
                el.onclick = () => { 
                    currentDayOption = opt.id; 
                    renderDayType(); 
                    
                    if (opt.id === 'custom_days') {
                        closeBS('day-type');
                        renderCustomDaysCheckboxes();
                        openBS('custom-days');
                    } else if (opt.id === 'custom_dates') {
                        closeBS('day-type');
                        renderCustomDatesCal();
                        openBS('custom-dates');
                    } else {
                        closeBS('day-type');
                        document.getElementById('day-wise-display').value = opt.label;
                    }
                };
                el.innerHTML = `
                    <div class="radio-btn ${isSelected ? 'active' : ''}"></div>
                    <span class="text-[16px] text-app-sub font-medium font-roboto">${opt.label}</span>
                `;
                list.appendChild(el);
            });
        }
        renderDayType();

        /* Custom Days Logic */
        const weekDaysArr = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
        const selectedCustomDays = new Set();
        function renderCustomDaysCheckboxes() {
            const list = document.getElementById('custom-days-list');
            list.innerHTML = '';
            weekDaysArr.forEach(day => {
                const isSelected = selectedCustomDays.has(day);
                const el = document.createElement('div');
                el.className = 'flex items-center justify-between px-3 py-3 hover:bg-gray-50 cursor-pointer rounded-lg mb-1';
                el.onclick = () => {
                    if (selectedCustomDays.has(day)) selectedCustomDays.delete(day);
                    else selectedCustomDays.add(day);
                    renderCustomDaysCheckboxes();
                };
                el.innerHTML = `
                    <span class="text-[15px] text-app-text font-medium font-roboto">${day}</span>
                    <div class="check-box ${isSelected ? 'active' : ''}">
                        ${isSelected ? '<i data-lucide="check" class="w-4 h-4 text-white"></i>' : ''}
                    </div>
                `;
                list.appendChild(el);
            });
            lucide.createIcons();
        }
        function applyCustomDays() {
            if (selectedCustomDays.size > 0) {
                const count = selectedCustomDays.size;
                document.getElementById('day-wise-display').value = count === 1 ? Array.from(selectedCustomDays)[0] : `${count} Custom Days`;
            } else {
                document.getElementById('day-wise-display').value = '';
            }
            closeBS('custom-days');
        }



        /* Pure Time Picker */
        let pureTimeEditingField = null; // 'peak-start' | 'peak-end' | 'nonpeak-start' | 'nonpeak-end'
        let selectedPureTime = null;

        function openPureTimePicker(fieldId) {
            pureTimeEditingField = fieldId;
            selectedPureTime = null;
            renderPureTimeList();
            openBS('pure-time-select');
        }

        function renderPureTimeList() {
            const timeList = document.getElementById('pure-time-list');
            let timeHtml = '';
            const times = ["06:00 AM", "07:00 AM", "08:00 AM", "09:00 AM", "10:00 AM", "11:00 AM", "12:00 PM", "01:00 PM", "02:00 PM", "03:00 PM", "04:00 PM", "05:00 PM", "06:00 PM", "07:00 PM", "08:00 PM", "09:00 PM", "10:00 PM", "11:00 PM"];
            times.forEach((t) => {
                timeHtml += `<div class="time-cell" onclick="selectPureTime(this, '${t}')">${t}</div>`;
            });
            timeList.innerHTML = timeHtml;
        }

        function selectPureTime(el, timeStr) {
            document.querySelectorAll('#pure-time-list .time-cell').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
            selectedPureTime = timeStr;
        }

        function applyPureTime() {
            if(!selectedPureTime) {
                alert("Please select a time");
                return;
            }
            document.getElementById(pureTimeEditingField + '-display').value = selectedPureTime;
            closeBS('pure-time-select');
        }

        /* Date Select Logic */
        let dateEditingField = null; // 'coupon-start' or 'coupon-end'
        let tempSelectedDate = null;
        let pendingDateNumber = null;

        let currentCalMonth = new Date().getMonth();
        let currentCalYear = new Date().getFullYear();
        const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
        const fullMonthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

        function openDateSelect(fieldId) {
            dateEditingField = fieldId;
            tempSelectedDate = null;
            pendingDateNumber = null;
            const now = new Date();
            currentCalMonth = now.getMonth();
            currentCalYear = now.getFullYear();
            renderDateSelectCal();
            openBS('date-select');
        }

        function changeDpMonth(delta) {
            currentCalMonth += delta;
            if (currentCalMonth < 0) { currentCalMonth = 11; currentCalYear--; }
            if (currentCalMonth > 11) { currentCalMonth = 0; currentCalYear++; }
            renderDateSelectCal();
        }

        function changeDpYear(delta) {
            currentCalYear += delta;
            renderDateSelectCal();
        }

        function renderDateSelectCal() {
            document.getElementById('dp-month-lbl').innerText = monthNames[currentCalMonth];
            document.getElementById('dp-year-lbl').innerText = currentCalYear;

            const cal = document.getElementById('bs-calendar-dates');
            let html = '';
            
            const firstDay = new Date(currentCalYear, currentCalMonth, 1).getDay();
            const daysInMonth = new Date(currentCalYear, currentCalMonth + 1, 0).getDate();
            
            let startDateObj = null;
            if (dateEditingField === 'coupon-end') {
                const startStr = document.getElementById('coupon-start-date-display').value;
                if (startStr) {
                    const cleanStr = startStr.replace(/(st|nd|rd|th)/, '');
                    startDateObj = new Date(cleanStr);
                    startDateObj.setHours(0,0,0,0);
                }
            }

            for(let i=0; i<firstDay; i++) {
                html += `<div class="cal-cell other-month"></div>`;
            }
            
            for(let d=1; d<=daysInMonth; d++) {
                const cellDate = new Date(currentCalYear, currentCalMonth, d);
                cellDate.setHours(0,0,0,0);
                
                let isDisabled = false;
                if (startDateObj && cellDate <= startDateObj) {
                    isDisabled = true;
                }
                
                const selectedClass = (pendingDateNumber === d) ? 'selected' : '';
                
                if (isDisabled) {
                    html += `<div class="cal-cell other-month" style="opacity: 0.5; pointer-events: none;">${d}</div>`;
                } else {
                    html += `<div class="cal-cell ${selectedClass}" onclick="selectDateOnly(this, ${d})">${d}</div>`;
                }
            }
            cal.innerHTML = html;
        }

        function selectDateOnly(el, day) {
            pendingDateNumber = day;
            // E.g. "12th Jan 2025" logic:
            let suffix = "th";
            if (day % 10 === 1 && day !== 11) suffix = "st";
            else if (day % 10 === 2 && day !== 12) suffix = "nd";
            else if (day % 10 === 3 && day !== 13) suffix = "rd";
            
            tempSelectedDate = `${day}${suffix} ${monthNames[currentCalMonth]} ${currentCalYear}`;
            renderDateSelectCal();
        }

        function confirmDateSelect() {
            if(!tempSelectedDate) {
                alert("Please select a date from the calendar");
                return;
            }
            document.getElementById(dateEditingField + '-date-display').value = tempSelectedDate;
            closeBS('date-select');
        }

        // Bottom Sheet Utilities
        function openBS(id) {
            document.getElementById('bs-' + id).classList.add('open');
        }
        function closeBS(id) {
            document.getElementById('bs-' + id).classList.remove('open');
        }

        function showCancelPopup() {
            openBS('cancel-confirm');
        }

        function confirmCancel() {
            closeBS('cancel-confirm');
            showErrorToaster();
            setTimeout(() => {
                window.location.href = 'home.html';
            }, 1500);
        }

        function showSuccessToaster() {
            const t = document.getElementById('success-toaster');
            t.classList.remove('-translate-y-[150%]');
            t.classList.add('translate-y-0');
            setTimeout(() => {
                t.classList.remove('translate-y-0');
                t.classList.add('-translate-y-[150%]');
                window.location.href = 'home.html';
            }, 3000);
        }

        function showErrorToaster() {
            const t = document.getElementById('error-toaster');
            t.classList.remove('-translate-y-[150%]');
            t.classList.add('translate-y-0');
            setTimeout(() => {
                t.classList.remove('translate-y-0');
                t.classList.add('-translate-y-[150%]');
            }, 3000);
        }

    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Turf With Sports – Fabzia Admin</title>
    <meta name="description" content="Assign a sport to a turf with timings, duration and pricing." />

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="utility.css" />

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              "app-bg":          "hsl(0,0%,96%)",
              "app-heading":     "#1a1a1a",
              "app-text":        "rgba(15,15,15,1)",
              "app-sub":         "rgba(77,77,77,1)",
              "app-placeholder": "rgba(171,171,171,1)",
              "app-border":      "#d7d7d7",
              "app-icon":        "#4d4d4d",
              "app-btn":         "#125dcd",
            },
            fontFamily: {
              inter:  ["Inter",  "sans-serif"],
              roboto: ["Roboto", "sans-serif"],
            },
          },
        },
      };
    </script>

    <style>
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-4px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in { animation: fadeIn 0.18s ease-out forwards; }

      .scrollbar-hide::-webkit-scrollbar { display: none; }
      .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

      .form-scroll-area { padding-bottom: 88px; }

      input:focus, textarea:focus, select:focus {
        border-color: #1a1a1a !important;
        outline: none;
      }

      /* ── Time menu scroll ── */
      .time-menu {
        max-height: 240px; /* 5 items (48px each) */
      }
    </style>
  </head>

  <body class="flex justify-center min-h-screen" style="background:hsl(0,0%,96%)">
    <div id="app" class="w-full max-w-[430px] min-h-screen flex flex-col relative" style="background:hsl(0,0%,96%)">

      <!-- ── Nav ── -->
      <div class="sticky top-0 z-30 flex items-center gap-2 px-1 py-2 border-b border-app-border bg-white h-16">
        <button onclick="window.location.href='home.html'" aria-label="Go back"
          class="w-12 h-12 flex items-center justify-center shrink-0 rounded-full active:bg-gray-100 transition-colors">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path fill-rule="evenodd" clip-rule="evenodd"
              d="M16.966 5.25L10.216 12L16.966 18.75L15.375 20.341L7.034 12L15.375 3.659L16.966 5.25Z" fill="#1A1A1A"/>
          </svg>
        </button>
        <span class="font-inter text-[18px] font-normal leading-[28px] tracking-[0.04px] text-app-heading">
          Turf With Sports
        </span>
      </div>

      <!-- ── Form ── -->
      <div class="flex-1 flex flex-col gap-5 px-5 pt-5 form-scroll-area">

        <!-- Main Sports Selection -->
        <div class="flex flex-col gap-2 relative stop-global-click">
            <label class="font-inter text-[14px] font-semibold tracking-[0.04px] text-app-heading">
                Select Sports
            </label>
            <button type="button" onclick="toggleMainSports()" class="w-full flex items-center justify-between h-[52px] px-3 rounded-[8px] border border-app-border bg-white focus:outline-none transition-colors">
                <span id="main-sports-label" class="font-roboto text-[16px] text-app-placeholder line-clamp-1 text-left mr-2">Select Sports</span>
                <svg id="main-sports-chevron" width="24" height="24" viewBox="0 0 24 24" fill="none" class="shrink-0 transition-transform duration-200">
                    <path d="M6 9L12 15L18 9" stroke="#4D4D4D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            <div id="main-sports-menu" class="hidden absolute top-full left-0 right-0 mt-1 bg-white border border-app-border rounded-[8px] z-40 shadow-lg overflow-y-auto max-h-[240px] animate-fade-in custom-scrollbar"></div>
        </div>

        <!-- Fill Sports Heading -->
        <h2 id="fill-sports-heading" class="hidden font-inter text-[16px] font-semibold tracking-[0.04px] text-app-heading mt-2">
            Fill Sports Field
        </h2>

        <!-- Sport Sections Container -->
        <div id="sport-sections-container" class="flex flex-col gap-5">
            <!-- Dynamically populated -->
        </div>

      </div><!-- /form -->

      <!-- ── Sticky Bottom ── -->
      <div class="sticky bottom-0 z-30 w-full px-5 py-4 border-t border-app-border bg-white">
        <button id="btn-confirm" type="button" onclick="handleConfirm()"
          class="w-full h-[52px] bg-app-btn text-white rounded-[8px] font-inter text-[16px] font-semibold leading-[24px] tracking-[0.04px] active:opacity-90 transition-opacity">
          Confirm
        </button>
      </div>

    </div><!-- /app -->

    <!-- ══════════════════════════════════════════════════════
         DISCARD BOTTOM SHEET
    ══════════════════════════════════════════════════════ -->
    <div id="discard-overlay" onclick="closeDiscardSheet()" class="fixed inset-0 z-50 bg-black/50 hidden transition-opacity duration-300 opacity-0 flex items-end justify-center">
      <div id="discard-sheet" onclick="event.stopPropagation()" class="w-full max-w-[430px] bg-white rounded-t-[20px] p-6 pb-8 transform translate-y-full transition-transform duration-300 flex flex-col gap-6">
        <!-- Handle bar -->
        <div class="flex justify-center -mt-2">
            <div class="w-10 h-1 rounded-full bg-gray-300"></div>
        </div>
        
        <div class="flex flex-col gap-2 relative mt-2 text-left">
            <p class="font-inter text-[18px] font-semibold text-app-heading">Discard Details</p>
            <p class="font-roboto text-[16px] text-app-sub">Do you want to Discard Details for <span id="discard-sport-name" class="font-normal text-app-heading"></span>?</p>
        </div>

        <div class="flex items-center gap-3 w-full">
            <button type="button" onclick="closeDiscardSheet()" class="flex-1 h-[52px] rounded-[8px] border border-app-border bg-white font-inter text-[16px] font-semibold text-app-heading active:bg-gray-50 transition-colors">
                Cancel
            </button>
            <button type="button" onclick="confirmDiscard()" class="flex-1 h-[52px] rounded-[8px] font-inter text-[16px] font-semibold text-white active:opacity-90 transition-opacity" style="background-color: #DE3636;">
                Yes
            </button>
        </div>
      </div>
    </div>

    <script>
      /* ═══════════════ GLOBAL DECLARATIONS ═══════════════ */
      const TIME_OPTIONS = [];
      for (let h = 0; h < 24; h++) {
        for (let m = 0; m < 60; m += 30) {
          const ampm  = h < 12 ? "AM" : "PM";
          const hour  = h % 12 === 0 ? 12 : h % 12;
          const min   = String(m).padStart(2, "0");
          const label = `${hour}:${min} ${ampm}`;
          const value = `${String(h).padStart(2,"0")}:${min}`; // 24h
          TIME_OPTIONS.push({ label, value });
        }
      }

      const TURF_LIST = [
        "Green Valley Turf", "City Sports Arena", "Sunrise Football Ground",
        "Champions Cricket Turf", "Riverside Badminton Court", "Elite Sports Complex",
      ];
      
      const ALL_SPORTS = [
          "Cricket", "Football", "Badminton", "Tennis", 
          "Basketball", "Volleyball", "Hockey", "Swimming"
      ];

      let selectedSports = [];
      let mainSportsOpen = false;
      const sportState = {}; 

      /* ═══════════════ MAIN SPORTS DROPDOWN ═══════════════ */
      function buildMainSportsMenu() {
        const menu = document.getElementById("main-sports-menu");
        menu.innerHTML = ALL_SPORTS.map(sport => {
            const isSel = selectedSports.includes(sport);
            return `
            <button type="button" onclick="toggleSportSelection('${sport}')" class="w-full flex items-center gap-3 px-4 py-3 hover:bg-gray-50 transition-colors ${isSel ? 'bg-gray-50' : ''}">
                <div class="w-5 h-5 rounded-[4px] border ${isSel ? 'bg-app-btn border-app-btn' : 'border-[#d7d7d7]'} flex items-center justify-center shrink-0">
                    <svg class="${isSel ? 'block' : 'hidden'}" width="12" height="12" viewBox="0 0 12 12" fill="none">
                        <path d="M2.5 6L5 8.5L9.5 4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <span class="font-roboto text-[16px] text-app-text">${sport}</span>
            </button>
            `;
        }).join("");
        
        const lbl = document.getElementById("main-sports-label");
        if (selectedSports.length === 0) {
            lbl.textContent = "Select Sports";
            lbl.style.color = "rgba(171,171,171,1)";
        } else {
            lbl.textContent = selectedSports.join(", ");
            lbl.style.color = "rgba(15,15,15,1)";
        }
      }

      function toggleMainSports() {
        const currentlyOpen = mainSportsOpen;
        closeAllDropdowns();
        if (!currentlyOpen) {
            mainSportsOpen = true;
            document.getElementById("main-sports-menu").classList.remove("hidden");
            document.getElementById("main-sports-chevron").style.transform = "rotate(180deg)";
            buildMainSportsMenu();
        }
      }

      let pendingDiscardSport = null;

      function toggleSportSelection(sport) {
        const safeSport = sport.replace(/\s+/g,'');
        if (selectedSports.includes(sport)) {
            const state = sportState[safeSport];
            const nameEl = document.getElementById(`nickname-${safeSport}`);
            const sportIdEl = document.getElementById(`sportId-${safeSport}`);
            const durationEl = document.getElementById(`duration-${safeSport}`);
            const minAmountEl = document.getElementById(`minAmount-${safeSport}`);

            const hasData = (state && (state.turf || state.start || state.end)) ||
                            (nameEl && nameEl.value.trim() !== '') ||
                            (sportIdEl && sportIdEl.value.trim() !== '') ||
                            (durationEl && durationEl.value.trim() !== '') ||
                            (minAmountEl && minAmountEl.value.trim() !== '');

            if (hasData) {
                openDiscardSheet(sport);
                return;
            } else {
                removeSport(sport);
            }
        } else {
            selectedSports.push(sport);
            sportState[safeSport] = { turf: '', start: '', end: '', turfOpen: false, startOpen: false, endOpen: false, expanded: true };
            addSportDOM(sport);
        }
        buildMainSportsMenu();
        updateSportsHeading();
      }

      function removeSport(sport) {
        const safeSport = sport.replace(/\s+/g,'');
        selectedSports = selectedSports.filter(s => s !== sport);
        const section = document.getElementById(`sport-section-${safeSport}`);
        if(section) section.remove();
        delete sportState[safeSport];
        buildMainSportsMenu();
        updateSportsHeading();
      }

      function openDiscardSheet(sport) {
        pendingDiscardSport = sport;
        document.getElementById('discard-sport-name').textContent = sport;
        
        const overlay = document.getElementById("discard-overlay");
        const sheet   = document.getElementById("discard-sheet");
        closeAllDropdowns();
        
        overlay.classList.remove("hidden");
        setTimeout(() => {
            overlay.classList.remove("opacity-0");
            sheet.classList.remove("translate-y-full");
        }, 10);
      }

      function closeDiscardSheet() {
        const overlay = document.getElementById("discard-overlay");
        const sheet   = document.getElementById("discard-sheet");
        
        overlay.classList.add("opacity-0");
        sheet.classList.add("translate-y-full");
        
        setTimeout(() => {
            overlay.classList.add("hidden");
            pendingDiscardSport = null;
        }, 300);
      }

      function confirmDiscard() {
        if (pendingDiscardSport) {
            removeSport(pendingDiscardSport);
        }
        closeDiscardSheet();
      }

      function updateSportsHeading() {
          const heading = document.getElementById('fill-sports-heading');
          if (heading) {
              if (selectedSports.length > 0) {
                  heading.classList.remove('hidden');
              } else {
                  heading.classList.add('hidden');
              }
          }
      }

      /* ═══════════════ PER-SPORT ACCORDIONS ═══════════════ */
      function addSportDOM(sport) {
        const container = document.getElementById("sport-sections-container");
        const div = document.createElement('div');
        const safeSport = sport.replace(/\s+/g, '');
        div.id = `sport-section-${safeSport}`;
        div.className = "flex flex-col border border-app-border rounded-[8px] bg-white overflow-visible transition-all duration-300 animate-fade-in";

        div.innerHTML = `
          <!-- Accordion Header -->
          <button type="button" onclick="toggleSportAccordion('${safeSport}')" class="flex items-center justify-between w-full h-[56px] px-4 bg-[#f8f9fa] rounded-t-[8px] border-b border-app-border active:bg-gray-100 transition-colors">
            <span class="font-inter font-semibold text-[15px] text-app-heading">${sport}</span>
            <svg id="chevron-${safeSport}" class="transition-transform duration-200" style="transform: rotate(180deg);" width="20" height="20" viewBox="0 0 24 24" fill="none" class="shrink-0">
                <path d="M6 9L12 15L18 9" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          
          <!-- Accordion Content -->
          <div id="content-${safeSport}" class="flex flex-col gap-4 p-4 rounded-b-[8px]">
            
            <div class="flex flex-col gap-2">
              <label class="font-inter text-[14px] font-semibold text-app-heading">Nickname</label>
              <input id="nickname-${safeSport}" type="text" placeholder="Nickname" onfocus="scrollToField(this)"
                class="w-full h-[52px] px-3 rounded-[8px] border border-app-border font-roboto text-[16px] text-app-text placeholder:text-app-placeholder outline-none focus:border-app-heading transition-colors" />
            </div>

            <div class="flex flex-col gap-2 relative stop-global-click">
              <label class="font-inter text-[14px] font-semibold text-app-heading">Turf List</label>
              <button type="button" onclick="toggleLocalDropdown('${safeSport}', 'turf')" class="w-full flex items-center justify-between h-[52px] px-3 rounded-[8px] border border-app-border bg-white focus:outline-none transition-colors">
                <span id="turf-label-${safeSport}" class="font-roboto text-[16px] text-app-placeholder">Select Turf</span>
                <svg id="turf-chevron-${safeSport}" width="24" height="24" viewBox="0 0 24 24" fill="none" class="shrink-0 transition-transform duration-200">
                   <path d="M6 9L12 15L18 9" stroke="#4D4D4D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </button>
              <div id="turf-menu-${safeSport}" class="hidden absolute top-full left-0 right-0 mt-1 bg-white border border-app-border rounded-[8px] z-30 shadow-lg overflow-y-auto max-h-[200px]"></div>
            </div>

            <div class="flex flex-col gap-2">
              <label class="font-inter text-[14px] font-semibold text-app-heading">Sport id</label>
              <input id="sportId-${safeSport}" type="text" placeholder="Sport id" onfocus="scrollToField(this)"
                class="w-full h-[52px] px-3 rounded-[8px] border border-app-border font-roboto text-[16px] text-app-text placeholder:text-app-placeholder outline-none focus:border-app-heading transition-colors" />
            </div>

            <div class="flex flex-col gap-2 relative stop-global-click">
              <label class="font-inter text-[14px] font-semibold text-app-heading">Turf Start Time</label>
              <button type="button" onclick="toggleLocalDropdown('${safeSport}', 'start')" class="w-full flex items-center justify-between h-[52px] px-3 rounded-[8px] border border-app-border bg-white focus:outline-none transition-colors">
                <span id="start-label-${safeSport}" class="font-roboto text-[16px] text-app-placeholder">Select Start Time</span>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" class="shrink-0">
                  <circle cx="12" cy="12" r="9" stroke="#4d4d4d" stroke-width="1.5"/>
                  <path d="M12 7v5l3 3" stroke="#4d4d4d" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </button>
              <div id="start-menu-${safeSport}" class="hidden absolute top-full left-0 right-0 mt-1 bg-white border border-app-border rounded-[8px] z-30 shadow-lg overflow-y-auto max-h-[240px]"></div>
            </div>

            <div class="flex flex-col gap-2 relative stop-global-click">
              <label class="font-inter text-[14px] font-semibold text-app-heading">Turf End Time</label>
              <button type="button" onclick="toggleLocalDropdown('${safeSport}', 'end')" class="w-full flex items-center justify-between h-[52px] px-3 rounded-[8px] border border-app-border bg-white focus:outline-none transition-colors">
                <span id="end-label-${safeSport}" class="font-roboto text-[16px] text-app-placeholder">Select End Time</span>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" class="shrink-0">
                  <circle cx="12" cy="12" r="9" stroke="#4d4d4d" stroke-width="1.5"/>
                  <path d="M12 7v5l3 3" stroke="#4d4d4d" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </button>
              <div id="end-menu-${safeSport}" class="hidden absolute top-full left-0 right-0 mt-1 bg-white border border-app-border rounded-[8px] z-30 shadow-lg overflow-y-auto max-h-[240px]"></div>
            </div>

            <div class="flex flex-col gap-2">
              <label class="font-inter text-[14px] font-semibold text-app-heading">Sport Duration</label>
              <input id="duration-${safeSport}" type="text" inputmode="numeric" placeholder="Sport Duration" onfocus="scrollToField(this)"
                class="w-full h-[52px] px-3 rounded-[8px] border border-app-border font-roboto text-[16px] text-app-text placeholder:text-app-placeholder outline-none focus:border-app-heading transition-colors" />
            </div>

            <div class="flex flex-col gap-2">
              <label class="font-inter text-[14px] font-semibold text-app-heading">Minimum Amount</label>
              <input id="minAmount-${safeSport}" type="text" inputmode="decimal" placeholder="Minimum Amount" onfocus="scrollToField(this)"
                class="w-full h-[52px] px-3 rounded-[8px] border border-app-border font-roboto text-[16px] text-app-text placeholder:text-app-placeholder outline-none focus:border-app-heading transition-colors" />
            </div>

          </div>
        `;
        container.appendChild(div);
        
        buildMenusForSport(safeSport);
      }

      function toggleSportAccordion(sportKey) {
        const state = sportState[sportKey];
        state.expanded = !state.expanded;
        
        const content = document.getElementById(`content-${sportKey}`);
        const chevron = document.getElementById(`chevron-${sportKey}`);
        
        if(state.expanded) {
            content.classList.remove('hidden');
            content.classList.add('flex');
            chevron.style.transform = "rotate(180deg)";
        } else {
            content.classList.add('hidden');
            content.classList.remove('flex');
            chevron.style.transform = "";
        }
      }

      /* ═══════════════ PER-SPORT DROPDOWNS ═══════════════ */
      function buildMenusForSport(sportKey) {
        const turfMenu = document.getElementById(`turf-menu-${sportKey}`);
        turfMenu.innerHTML = TURF_LIST.map(t => {
           let isSel = sportState[sportKey].turf === t;
           return `<button type="button" onclick="selectLocalDropdown('${sportKey}', 'turf', '${t}', '${t}')" class="w-full flex items-center justify-between px-4 py-3 font-roboto text-[16px] text-app-text hover:bg-gray-50 ${isSel ? 'bg-gray-50' : ''}">
              <span>${t}</span>
              <svg class="${isSel ? '' : 'hidden'}" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
           </button>`;
        }).join('');

        const startMenu = document.getElementById(`start-menu-${sportKey}`);
        startMenu.innerHTML = TIME_OPTIONS.map(opt => {
           let isSel = sportState[sportKey].start === opt.value;
           return `<button type="button" onclick="selectLocalDropdown('${sportKey}', 'start', '${opt.value}', '${opt.label}')" class="w-full flex items-center justify-between px-4 py-3 h-[48px] font-roboto text-[16px] text-app-text hover:bg-gray-50 ${isSel ? 'bg-gray-50' : ''}">
              <span>${opt.label}</span>
              <svg class="${isSel ? '' : 'hidden'}" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
           </button>`;
        }).join('');

        const endMenu = document.getElementById(`end-menu-${sportKey}`);
        endMenu.innerHTML = TIME_OPTIONS.map(opt => {
           let isSel = sportState[sportKey].end === opt.value;
           return `<button type="button" onclick="selectLocalDropdown('${sportKey}', 'end', '${opt.value}', '${opt.label}')" class="w-full flex items-center justify-between px-4 py-3 h-[48px] font-roboto text-[16px] text-app-text hover:bg-gray-50 ${isSel ? 'bg-gray-50' : ''}">
              <span>${opt.label}</span>
              <svg class="${isSel ? '' : 'hidden'}" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
           </button>`;
        }).join('');
      }

      function toggleLocalDropdown(sportKey, type) {
        const currentlyOpen = sportState[sportKey][`${type}Open`];
        closeAllDropdowns();
        
        if (!currentlyOpen) {
            document.getElementById(`${type}-menu-${sportKey}`).classList.remove('hidden');
            if (type === 'turf') document.getElementById(`turf-chevron-${sportKey}`).style.transform = "rotate(180deg)";
            sportState[sportKey][`${type}Open`] = true;
        }
      }

      function selectLocalDropdown(sportKey, type, value, label) {
        document.getElementById(`${type}-menu-${sportKey}`).classList.add('hidden');
        sportState[sportKey][`${type}Open`] = false;

        sportState[sportKey][type] = value;
        
        const lblTarget = document.getElementById(`${type}-label-${sportKey}`);
        lblTarget.textContent = label;
        lblTarget.style.color = "rgba(15,15,15,1)";
        
        if (type === 'turf') {
            document.getElementById(`turf-chevron-${sportKey}`).style.transform = "";
        }
        
        buildMenusForSport(sportKey);
      }

      /* ═══════════════ GLOBAL UTILS ═══════════════ */
      function closeAllDropdowns() {
        mainSportsOpen = false;
        document.getElementById("main-sports-menu")?.classList.add("hidden");
        const mc = document.getElementById("main-sports-chevron");
        if(mc) mc.style.transform = "";

        Object.keys(sportState).forEach(key => {
            ['turf', 'start', 'end'].forEach(type => {
                sportState[key][`${type}Open`] = false;
                document.getElementById(`${type}-menu-${key}`)?.classList.add('hidden');
                if (type === 'turf') {
                    const chev = document.getElementById(`turf-chevron-${key}`);
                    if (chev) breakTransform(chev);
                }
            });
        });
      }

      function breakTransform(el) {
          el.style.transform = "";
      }

      document.addEventListener("click", e => {
        if (!e.target.closest('.stop-global-click')) {
            closeAllDropdowns();
        }
      });

      function scrollToField(el) {
        setTimeout(() => el.scrollIntoView({ behavior: "smooth", block: "center" }), 320);
      }

      /* ═══════════════ CONFIRM ═══════════════ */
      function handleConfirm() {
        const payload = selectedSports.map(sport => {
            const safeSport = sport.replace(/\s+/g,'');
            return {
                sportName: sport,
                nickname:  document.getElementById(`nickname-${safeSport}`)?.value.trim() || '',

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Add Coaching – Fabzia Admin</title>
    <meta name="description" content="Add a new coaching session with images, timings, location, price and description." />

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts: Inter + Roboto -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!-- Utility CSS (design tokens) -->
    <link rel="stylesheet" href="utility.css" />

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              "app-bg":          "hsl(0,0%,96%)",
              "app-heading":     "#1a1a1a",
              "app-text":        "rgba(15,15,15,1)",
              "app-sub":         "rgba(77,77,77,1)",
              "app-placeholder": "rgba(171,171,171,1)",
              "app-border":      "#d7d7d7",
              "app-icon":        "#4d4d4d",
              "app-btn":         "#125dcd",
              "app-field-bg":    "#f5f5f5",
            },
            fontFamily: {
              inter:  ["Inter",  "sans-serif"],
              roboto: ["Roboto", "sans-serif"],
            },
          },
        },
      };
    </script>

    <style>
      /* ── Animations ── */
      @keyframes fadeIn {
        from { opacity: 0; transform: scale(0.92); }
        to   { opacity: 1; transform: scale(1); }
      }
      .animate-fade-in { animation: fadeIn 0.15s ease-out forwards; }

      /* ── Scrollbar hide ── */
      .scrollbar-hide::-webkit-scrollbar { display: none; }
      .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

      /* ── Bottom padding so sticky button never covers content ── */
      .form-scroll-area { padding-bottom: 88px; }

      /* ── Focus border ── */
      input:focus, textarea:focus { border-color: #1a1a1a !important; }

      /* ── Image card base ── */
      .img-card {
        position: relative;
        width: 72px;
        height: 72px;
        border-radius: 4px;
        overflow: hidden;
        flex-shrink: 0;
      }
    </style>
  </head>

  <body class="flex justify-center min-h-screen" style="background:hsl(0,0%,96%)">
    <!-- ── Outer wrapper (max 430 px) ── -->
    <div id="app" class="w-full max-w-[430px] min-h-screen flex flex-col relative" style="background:hsl(0,0%,96%)">

      <!-- ── Sticky Nav Bar ── -->
      <div class="sticky top-0 z-30 flex items-center gap-2 px-1 py-2 border-b border-app-border bg-white h-16">
        <button
          onclick="window.location.href='home.html'"
          aria-label="Go back"
          class="w-12 h-12 flex items-center justify-center shrink-0 rounded-full active:bg-gray-100 transition-colors"
        >
          <!-- Chevron Left -->
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path fill-rule="evenodd" clip-rule="evenodd"
              d="M16.966 5.25L10.216 12L16.966 18.75L15.375 20.341L7.034 12L15.375 3.659L16.966 5.25Z"
              fill="#1A1A1A"/>
          </svg>
        </button>
        <span class="font-inter text-[18px] font-normal leading-[28px] tracking-[0.04px] text-app-heading">
          Add Coaching
        </span>
      </div>

      <!-- ── Scrollable Form ── -->
      <div class="flex flex-col gap-4 px-5 pt-5 form-scroll-area">

        <!-- ── Coaching Image URL ── -->
        <div class="flex flex-col gap-2">
          <label class="font-inter text-[14px] font-semibold leading-[160%] tracking-[0.04px] text-app-heading">
            Coaching Image url
          </label>

          <!-- URL text input -->
          <input
            id="field-imageUrl"
            type="url"
            placeholder="example.com"
            onfocus="scrollToField(this)"
            class="w-full h-[52px] px-3 rounded-[8px] border border-app-border font-roboto text-[16px] font-normal leading-[24px] tracking-[0.5px] text-app-text placeholder:text-app-placeholder outline-none bg-white transition-colors"
          />

          <!-- Image cards row: left-aligned, wraps onto next line if needed -->
          <div id="image-cards-row" class="flex items-start justify-start gap-2 flex-wrap">

            <!-- DUMMY pre-selected image (with cross) -->
            <div class="img-card animate-fade-in" id="dummy-img-card">
              <!-- Gradient placeholder simulating a photo -->
              <div class="absolute inset-0" style="background:linear-gradient(135deg,#78909c,#37474f)"></div>
              <!-- sport silhouette overlay -->
              <div class="absolute inset-0 flex items-center justify-center opacity-50">
                <svg width="36" height="36" viewBox="0 0 24 24" fill="white">
                  <circle cx="12" cy="8" r="3"/>
                  <path d="M6 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/>
                </svg>
              </div>
              <!-- Dim overlay -->
              <div class="absolute inset-0 rounded-[4px]" style="background:rgba(0,0,0,0.18)"></div>
              <!-- ✕ remove btn -->
              <button
                type="button"
                onclick="removeImageCard(this)"
                aria-label="Remove image"
                class="absolute top-[3px] right-[3px] w-[22px] h-[22px] rounded-[6px] flex items-center justify-center"
                style="background:rgba(255,255,255,0.28)"
              >
                <svg width="10" height="10" viewBox="0 0 12 12" fill="none">
                  <path d="M1 1l10 10M11 1L1 11" stroke="white" stroke-width="2" stroke-linecap="round"/>
                </svg>
              </button>
            </div>

            <!-- Add button card -->
            <button
              type="button"
              id="add-img-btn"
              onclick="triggerImagePick()"
              class="img-card border border-app-border flex flex-col items-center justify-center gap-0.5"
              style="background:#f0f0f0"
            >
              <!-- + icon -->
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M19 13H13V19H11V13H5V11H11V5H13V11H19V13Z" fill="#1A1A1A"/>
              </svg>
              <span class="font-inter text-[12px] font-normal leading-[18px] text-app-heading">Add</span>
            </button>

            <!-- Hidden file input -->
            <input
              id="file-input"
              type="file"
              accept="image/*"
              multiple
              class="hidden"
              onchange="onFilesPicked(event)"
            />
          </div>
        </div>

        <!-- ── No. of Days ── -->
        <div class="flex flex-col gap-2">
          <label class="font-inter text-[14px] font-semibold leading-[160%] tracking-[0.04px] text-app-heading">
            No. of Days
          </label>
          <input
            id="field-days"
            type="text"
            inputmode="numeric"
            placeholder="Days"
            onfocus="scrollToField(this)"
            class="w-full h-[52px] px-3 rounded-[8px] border border-app-border font-roboto text-[16px] font-normal leading-[24px] tracking-[0.5px] text-app-text placeholder:text-app-placeholder outline-none bg-white transition-colors"
          />
        </div>

        <!-- ── Timings ── -->
        <div class="flex flex-col gap-2">
          <label class="font-inter text-[14px] font-semibold leading-[160%] tracking-[0.04px] text-app-heading">
            Timings
          </label>
          <input
            id="field-timings"
            type="text"
            placeholder="eg. 10Am -12pm"
            onfocus="scrollToField(this)"
            class="w-full h-[52px] px-3 rounded-[8px] border border-app-border font-roboto text-[16px] font-normal leading-[24px] tracking-[0.5px] text-app-text placeholder:text-app-placeholder outline-none bg-white transition-colors"
          />
        </div>

        <!-- ── Location ── -->
        <div class="flex flex-col gap-2">
          <label class="font-inter text-[14px] font-semibold leading-[160%] tracking-[0.04px] text-app-heading">
            Location
          </label>
          <input
            id="field-location"
            type="text"
            placeholder="Location"
            onfocus="scrollToField(this)"
            class="w-full h-[52px] px-3 rounded-[8px] border border-app-border font-roboto text-[16px] font-normal leading-[24px] tracking-[0.5px] text-app-text placeholder:text-app-placeholder outline-none bg-white transition-colors"
          />
        </div>

        <!-- ── Price ── -->
        <div class="flex flex-col gap-2">
          <label class="font-inter text-[14px] font-semibold leading-[160%] tracking-[0.04px] text-app-heading">
            Price
          </label>
          <input
            id="field-price"
            type="text"
            inputmode="decimal"
            placeholder="Price"
            onfocus="scrollToField(this)"
            class="w-full h-[52px] px-3 rounded-[8px] border border-app-border font-roboto text-[16px] font-normal leading-[24px] tracking-[0.5px] text-app-text placeholder:text-app-placeholder outline-none bg-white transition-colors"
          />
        </div>

        <!-- ── Coaching Name ── -->
        <div class="flex flex-col gap-2">
          <label class="font-inter text-[14px] font-semibold leading-[160%] tracking-[0.04px] text-app-heading">
            Coaching Name
          </label>
          <input
            id="field-coachingName"
            type="text"
            placeholder="Coaching Name"
            onfocus="scrollToField(this)"
            class="w-full h-[52px] px-3 rounded-[8px] border border-app-border font-roboto text-[16px] font-normal leading-[24px] tracking-[0.5px] text-app-text placeholder:text-app-placeholder outline-none bg-white transition-colors"
          />
        </div>

        <!-- ── Description ── -->
        <div class="flex flex-col gap-2">
          <label class="font-inter text-[14px] font-semibold leading-[160%] tracking-[0.04px] text-app-heading">
            Description
          </label>
          <textarea
            id="field-description"
            placeholder="Description"
            rows="4"
            onfocus="scrollToField(this)"
            class="w-full px-3 py-3 rounded-[8px] border border-app-border font-roboto text-[16px] font-normal leading-[24px] tracking-[0.5px] text-app-text placeholder:text-app-placeholder outline-none bg-white resize-none transition-colors"
            style="height:124px"
          ></textarea>
        </div>

        <!-- ── Enquire Now checkbox ── -->
        <div class="flex flex-col gap-2">
          <button
            type="button"
            id="enquire-btn"
            onclick="toggleEnquire()"
            class="flex items-center gap-3 h-12 px-0 rounded-[8px] active:opacity-70 transition-opacity w-fit"
          >
            <!-- Checkbox -->
            <div
              id="enquire-box"
              class="w-5 h-5 rounded-[4px] border-2 border-app-border flex items-center justify-center shrink-0 transition-colors"
            >
              <!-- checkmark, hidden by default -->
              <svg id="enquire-check" class="hidden" width="12" height="12" viewBox="0 0 12 12" fill="none">
                <path d="M2 6l3 3 5-5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <span class="font-roboto text-[16px] font-normal leading-[24px] tracking-[0.5px] text-app-sub">
              Enquire Now
            </span>
          </button>
        </div>

      </div><!-- /form-scroll-area -->

      <!-- ── Sticky Bottom Button ── -->
      <div class="sticky bottom-0 z-30 w-full px-5 py-4 border-t border-app-border bg-white">
        <button
          id="btn-submit"
          type="button"
          onclick="handleSubmit()"
          class="w-full h-[52px] bg-app-btn text-white rounded-[8px] font-inter text-[16px] font-semibold leading-[24px] tracking-[0.04px] active:opacity-90 transition-opacity"
        >
          Add Coaching
        </button>
      </div>

    </div><!-- /app -->

    <script>
      /* ═══════════════════════════════════════════════
         STATE
      ═══════════════════════════════════════════════ */
      let enquireChecked = false;

      /* ═══════════════════════════════════════════════
         SCROLL TO FIELD
      ═══════════════════════════════════════════════ */
      function scrollToField(el) {
        setTimeout(() => {
          el.scrollIntoView({ behavior: "smooth", block: "center" });
        }, 320);
      }

      /* ═══════════════════════════════════════════════
         ENQUIRE CHECKBOX TOGGLE
      ═══════════════════════════════════════════════ */
      function toggleEnquire() {
        enquireChecked = !enquireChecked;
        const box   = document.getElementById("enquire-box");
        const check = document.getElementById("enquire-check");
        if (enquireChecked) {
          box.style.backgroundColor = "#125dcd";
          box.style.borderColor     = "#125dcd";
          check.classList.remove("hidden");
        } else {
          box.style.backgroundColor = "";
          box.style.borderColor     = "#d7d7d7";
          check.classList.add("hidden");
        }
      }

      /* ═══════════════════════════════════════════════
         IMAGE PICKER
      ═══════════════════════════════════════════════ */
      function triggerImagePick() {
        document.getElementById("file-input").click();
      }

      function onFilesPicked(e) {
        const files = [...e.target.files];
        files.forEach((file) => {
          const reader = new FileReader();
          reader.onload = (ev) => addImageCard(ev.target.result);
          reader.readAsDataURL(file);
        });
        /* reset so same file can be re-picked */
        e.target.value = "";
      }

      function addImageCard(src) {
        const row    = document.getElementById("image-cards-row");
        const addBtn = document.getElementById("add-img-btn");

        const card = document.createElement("div");
        card.className = "img-card animate-fade-in";

        card.innerHTML = `
          <img src="${src}" alt="Coaching image"
            class="absolute inset-0 w-full h-full object-cover rounded-[4px]" />
          <div class="absolute inset-0 bg-black/20 rounded-[4px]"></div>
          <button
            type="button"
            onclick="removeImageCard(this)"
            aria-label="Remove image"
            class="absolute top-[3px] right-[3px] w-[22px] h-[22px] bg-white/25 rounded-[6px] flex items-center justify-center"
          >
            <svg width="10" height="10" viewBox="0 0 12 12" fill="none">
              <path d="M1 1l10 10M11 1L1 11" stroke="white" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>`;

        /* Insert before the Add button */
        row.insertBefore(card, addBtn);
      }

      function removeImageCard(btn) {
        const card = btn.closest(".img-card");
        if (card) card.remove();
      }



      /* ═══════════════════════════════════════════════
         SUBMIT
      ═══════════════════════════════════════════════ */
      function handleSubmit() {
        const payload = {
          imageUrl:     document.getElementById("field-imageUrl").value.trim(),
          days:         document.getElementById("field-days").value.trim(),
          timings:      document.getElementById("field-timings").value.trim(),
          location:     document.getElementById("field-location").value.trim(),
          price:        document.getElementById("field-price").value.trim(),
          coachingName: document.getElementById("field-coachingName").value.trim(),
          description:  document.getElementById("field-description").value.trim(),
          enquireNow:   enquireChecked,
        };
        console.log("Add Coaching payload:", payload);
        /* TODO: wire to API */
      }
    </script>
  </body>
</html>

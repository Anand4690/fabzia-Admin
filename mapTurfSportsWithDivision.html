<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Map Turf Sports with Division – Fabzia Admin</title>
    <meta name="description" content="Map a turf sport with division settings including length, width, players aside and parent unique reference." />

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts: Inter + Roboto -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!-- Utility CSS (design tokens) -->
    <link rel="stylesheet" href="utility.css" />

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              "app-bg":          "hsl(0,0%,96%)",
              "app-heading":     "#1a1a1a",
              "app-text":        "rgba(15,15,15,1)",
              "app-sub":         "rgba(77,77,77,1)",
              "app-placeholder": "rgba(171,171,171,1)",
              "app-border":      "#d7d7d7",
              "app-icon":        "#4d4d4d",
              "app-btn":         "#125dcd",
            },
            fontFamily: {
              inter:  ["Inter",  "sans-serif"],
              roboto: ["Roboto", "sans-serif"],
            },
          },
        },
      };
    </script>

    <style>
      /* ── Animations ── */
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-4px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in { animation: fadeIn 0.18s ease-out forwards; }

      /* ── Scrollbar hide ── */
      .scrollbar-hide::-webkit-scrollbar { display: none; }
      .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

      /* ── Bottom padding so sticky button never covers content ── */
      .form-scroll-area { padding-bottom: 88px; }

      /* ── Focus border ── */
      input:focus, textarea:focus, select:focus { border-color: #1a1a1a !important; outline: none; }

      /* BOTTOM SHEETS */
      .bs-overlay { position:fixed; inset:0; z-index:100; background:rgba(0,0,0,0.45); display:none; align-items:flex-end; justify-content:center; }
      .bs-overlay.open { display:flex; }
      .bs-panel { position:relative; width:100%; max-width:430px; background:#fff; border-radius:20px 20px 0 0; animation:bsSlideUp 0.3s cubic-bezier(0.4,0,0.2,1); max-height: 80vh; display: flex; flex-direction: column; }
      @keyframes bsSlideUp { from { transform:translateY(100%); } to { transform:translateY(0); } }

      .check-box { width:24px; height:24px; border-radius:4px; border:1.5px solid #d7d7d7; display:flex; align-items:center; justify-content:center; cursor: pointer; transition: all 0.2s; }
      .check-box.active { border-color:#125dcd; background:#125dcd; }

      /* ── Toast ── */
      #toast {
        position: fixed;
        bottom: 90px;
        left: 50%;
        transform: translateX(-50%) translateY(20px);
        background: #1a1a1a;
        color: #fff;
        padding: 10px 20px;
        border-radius: 8px;
        font-family: 'Inter', sans-serif;
        font-size: 14px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.25s ease, transform 0.25s ease;
        white-space: nowrap;
        z-index: 9999;
      }
      #toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    </style>
  </head>

  <body class="flex justify-center min-h-screen" style="background:hsl(0,0%,96%)">
    <!-- ── Outer wrapper (max 430 px) ── -->
    <div id="app" class="w-full max-w-[430px] min-h-screen flex flex-col" style="background:hsl(0,0%,96%)">

      <!-- ── Sticky Nav Bar ── -->
      <div class="sticky top-0 z-30 flex items-center gap-2 px-1 py-2 border-b border-app-border bg-white h-16">
        <button
          onclick="handleBackClick()"
          aria-label="Go back"
          id="btn-back"
          class="w-12 h-12 flex items-center justify-center shrink-0 rounded-full active:bg-gray-100 transition-colors"
        >
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path fill-rule="evenodd" clip-rule="evenodd"
              d="M16.966 5.25L10.216 12L16.966 18.75L15.375 20.341L7.034 12L15.375 3.659L16.966 5.25Z"
              fill="#1A1A1A"/>
          </svg>
        </button>
        <span class="font-inter text-[18px] font-normal leading-[28px] tracking-[0.04px] text-app-heading">
          Map Turf Sports with Division
        </span>
      </div>

      <!-- ── Scrollable Form ── -->
      <div class="flex-1 flex flex-col gap-4 px-5 pt-5 pb-[88px] overflow-y-auto scrollbar-hide">

        <!-- Turf Selection -->
        <div class="flex flex-col gap-2 w-full">
            <label class="font-inter text-[14px] font-semibold leading-[160%] tracking-[0.04px] text-app-heading">Select Turf</label>
            <div id="turf-container" class="border border-app-border flex items-center px-3 h-[52px] rounded-[8px] w-full bg-white relative cursor-pointer" onclick="openBS('turf-select')">
                <input type="text" id="turf-display" readonly placeholder="Select Turf" class="w-full h-full font-roboto text-[16px] font-normal text-app-text outline-none bg-transparent placeholder:text-app-placeholder pointer-events-none border-none focus:ring-0 cursor-pointer">
                <div class="absolute right-3 pointer-events-none text-app-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5"><path d="m6 9 6 6 6-6"/></svg>
                </div>
            </div>
        </div>

        <!-- Sport ID -->
        <div class="flex flex-col gap-2 w-full relative" id="sport-id-container">
            <label class="font-inter text-[14px] font-semibold leading-[160%] tracking-[0.04px] text-app-heading">Sport ID</label>
            <div class="border border-app-border flex items-center px-3 h-[52px] rounded-[8px] w-full bg-white relative cursor-pointer focus-within:border-app-heading transition-colors" onclick="toggleSportDropdown()">
                <input type="text" id="sport-id-display" readonly placeholder="Select Sport" class="w-full h-full font-roboto text-[16px] font-normal text-app-text outline-none bg-transparent placeholder:text-app-placeholder pointer-events-none border-none focus:ring-0 cursor-pointer">
                <input type="hidden" id="sport-id" value="">
                <div class="absolute right-3 pointer-events-none text-app-icon transition-transform duration-200" id="sport-id-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5"><path d="m6 9 6 6 6-6"/></svg>
                </div>
            </div>
            <!-- Custom Dropdown Menu -->
            <div id="sport-id-menu" class="absolute top-[82px] left-0 right-0 bg-white border border-app-border rounded-[8px] shadow-lg z-20 overflow-hidden hidden animate-fade-in origin-top">
                <div class="max-h-[200px] overflow-y-auto flex flex-col scrollbar-hide">
                    <button type="button" onclick="selectSport('001', 'Cricket ( id : 001 )', event)" class="w-full text-left px-4 py-3 hover:bg-gray-50 active:bg-gray-100 font-roboto text-[15px] border-b border-app-border text-app-text transition-colors">Cricket ( id : 001 )</button>
                    <button type="button" onclick="selectSport('002', 'Football ( id : 002 )', event)" class="w-full text-left px-4 py-3 hover:bg-gray-50 active:bg-gray-100 font-roboto text-[15px] border-b border-app-border text-app-text transition-colors">Football ( id : 002 )</button>
                    <button type="button" onclick="selectSport('003', 'Tennis ( id : 003 )', event)" class="w-full text-left px-4 py-3 hover:bg-gray-50 active:bg-gray-100 font-roboto text-[15px] text-app-text transition-colors">Tennis ( id : 003 )</button>
                </div>
            </div>
        </div>

        <!-- Length -->
        <div class="flex flex-col gap-2">
          <label for="field-length" class="font-inter text-[14px] font-semibold leading-[160%] tracking-[0.04px] text-app-heading">Length</label>
          <input id="field-length" type="text" inputmode="decimal" placeholder="Length" oninput="markDirty()" onfocus="scrollToField(this)" class="w-full h-[52px] px-3 rounded-[8px] border border-app-border font-roboto text-[16px] font-normal leading-[24px] tracking-[0.5px] text-app-text placeholder:text-app-placeholder bg-white transition-colors" />
        </div>

        <!-- Width -->
        <div class="flex flex-col gap-2">
          <label for="field-width" class="font-inter text-[14px] font-semibold leading-[160%] tracking-[0.04px] text-app-heading">Width</label>
          <input id="field-width" type="text" inputmode="decimal" placeholder="Width" oninput="markDirty()" onfocus="scrollToField(this)" class="w-full h-[52px] px-3 rounded-[8px] border border-app-border font-roboto text-[16px] font-normal leading-[24px] tracking-[0.5px] text-app-text placeholder:text-app-placeholder bg-white transition-colors" />
        </div>

        <!-- PlayerAside -->
        <div class="flex flex-col gap-2">
          <label for="field-playerAside" class="font-inter text-[14px] font-semibold leading-[160%] tracking-[0.04px] text-app-heading">PlayerAside</label>
          <input id="field-playerAside" type="text" inputmode="numeric" placeholder="PlayerAside" oninput="markDirty()" onfocus="scrollToField(this)" class="w-full h-[52px] px-3 rounded-[8px] border border-app-border font-roboto text-[16px] font-normal leading-[24px] tracking-[0.5px] text-app-text placeholder:text-app-placeholder bg-white transition-colors" />
        </div>

        <!-- Parent Unique Reference -->
        <div class="flex flex-col gap-2">
          <label for="field-parentRef" class="font-inter text-[14px] font-semibold leading-[160%] tracking-[0.04px] text-app-heading">Parent Unique Reference</label>
          <input id="field-parentRef" type="text" placeholder="Parent Unique Reference" oninput="markDirty()" onfocus="scrollToField(this)" class="w-full h-[52px] px-3 rounded-[8px] border border-app-border font-roboto text-[16px] font-normal leading-[24px] tracking-[0.5px] text-app-text placeholder:text-app-placeholder bg-white transition-colors" />
        </div>

        <!-- Division Side Type -->
        <div class="flex flex-col gap-2">
          <label for="field-divSideType" class="font-inter text-[14px] font-semibold leading-[160%] tracking-[0.04px] text-app-heading">Division Side Type</label>
          <input id="field-divSideType" type="text" placeholder="Division Side Type" oninput="markDirty()" onfocus="scrollToField(this)" class="w-full h-[52px] px-3 rounded-[8px] border border-app-border font-roboto text-[16px] font-normal leading-[24px] tracking-[0.5px] text-app-text placeholder:text-app-placeholder bg-white transition-colors" />
        </div>

        <!-- Division Priority Sequence -->
        <div class="flex flex-col gap-2">
          <label for="field-divPriority" class="font-inter text-[14px] font-semibold leading-[160%] tracking-[0.04px] text-app-heading">Division Priority Sequence</label>
          <input id="field-divPriority" type="text" placeholder="Division Priority Sequence" oninput="markDirty()" onfocus="scrollToField(this)" class="w-full h-[52px] px-3 rounded-[8px] border border-app-border font-roboto text-[16px] font-normal leading-[24px] tracking-[0.5px] text-app-text placeholder:text-app-placeholder bg-white transition-colors" />
        </div>

        <!-- Division Image url -->
        <div class="flex flex-col gap-2">
          <label for="field-divImageUrl" class="font-inter text-[14px] font-semibold leading-[160%] tracking-[0.04px] text-app-heading">Division Image url</label>
          <input id="field-divImageUrl" type="text" placeholder="Division Image url" oninput="markDirty()" onfocus="scrollToField(this)" class="w-full h-[52px] px-3 rounded-[8px] border border-app-border font-roboto text-[16px] font-normal leading-[24px] tracking-[0.5px] text-app-text placeholder:text-app-placeholder bg-white transition-colors" />
        </div>

      </div><!-- /form-scroll-area -->

      <!-- ── Sticky Bottom Action Buttons ── -->
      <div class="sticky bottom-0 z-30 w-full px-5 py-4 border-t border-app-border bg-white">
        <div class="flex items-center gap-3">
          <button onclick="handleCancelClick()" class="flex-1 flex justify-center items-center rounded-[8px] h-[52px] text-app-heading font-inter font-semibold text-[16px] border border-app-border bg-white active:bg-gray-50 transition-colors">
            Cancel
          </button>
          <button onclick="handleSave()" class="flex-1 flex justify-center items-center rounded-[8px] h-[52px] bg-app-btn text-white font-inter font-semibold text-[16px] active:opacity-90 transition-opacity">
            Save changes
          </button>
        </div>
      </div>

    </div><!-- /app -->

    <!-- ═══════════════════════════════════════
         BOTTOM SHEETS
    ═══════════════════════════════════════ -->

    <!-- Turf Selection Sheet -->
    <div id="bs-turf-select" class="bs-overlay" onclick="closeBS('turf-select')">
        <div class="bs-panel !h-[70vh] !max-h-[70vh]" onclick="event.stopPropagation()">
            <!-- Handle bar -->
            <div class="flex justify-center pt-3 pb-1">
              <div class="w-10 h-1 rounded-full bg-gray-200"></div>
            </div>
            <div class="flex items-center justify-between px-5 py-2 border-b border-app-border">
                <h3 class="text-[16px] font-semibold text-app-heading font-inter">Select Turf</h3>
                <button onclick="closeBS('turf-select')">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-app-heading"><path d="M18 6 6 18M6 6l12 12"/></svg>
                </button>
            </div>
            <div class="px-5 py-3 border-b border-app-border">
                <div class="border border-app-border rounded-lg flex items-center px-3 h-[40px] bg-gray-50 focus-within:border-app-btn focus-within:bg-white transition-colors">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-app-placeholder"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                    <input type="text" id="turf-search" oninput="renderTurfs()" placeholder="Search Turf" class="w-full h-full bg-transparent outline-none ml-2 text-[14px] text-app-text font-roboto">
                </div>
            </div>
            <div class="flex-1 overflow-y-auto px-2 py-2 no-scrollbar" id="turf-list"></div>
        </div>
    </div>

    <!-- Save Changes Confirmation Sheet -->
    <div id="bs-save-confirm" class="bs-overlay" onclick="closeBS('save-confirm')" style="z-index: 105;">
        <div class="bs-panel !rounded-t-[20px] !max-h-auto" onclick="event.stopPropagation()">
            <div class="p-6 flex flex-col gap-4">
                <h3 class="text-[18px] font-semibold text-app-heading text-left font-inter">Do you want to save changes?</h3>
                <div class="flex items-center gap-3 mt-2">
                    <button onclick="discardAndGoHome()" class="flex-1 h-[48px] rounded-[8px] text-app-heading font-semibold text-[16px] font-inter border border-app-border active:bg-gray-50 transition-colors">
                        No
                    </button>
                    <button onclick="saveAndGoHome()" class="flex-1 h-[48px] rounded-[8px] bg-app-btn text-white font-semibold text-[16px] font-inter active:opacity-90 transition-colors">
                        Yes
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast">Saved successfully!</div>

    <script>
      /* ═══════════════════════════════════════════════
         SCROLL TO FIELD
      ═══════════════════════════════════════════════ */
      function scrollToField(el) {
        setTimeout(() => {
          el.scrollIntoView({ behavior: "smooth", block: "center" });
        }, 320);
      }

      /* ═══════════════════════════════════════════════
         TOAST
      ═══════════════════════════════════════════════ */
      function showToast(msg) {
        const toast = document.getElementById("toast");
        toast.textContent = msg;
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2500);
      }

      /* ═══════════════════════════════════════════════
         SPORT DROPDOWN LOGIC
      ═══════════════════════════════════════════════ */
      function toggleSportDropdown() {
          const menu = document.getElementById('sport-id-menu');
          const icon = document.getElementById('sport-id-icon');
          if (menu.classList.contains('hidden')) {
              menu.classList.remove('hidden');
              icon.style.transform = 'rotate(180deg)';
          } else {
              menu.classList.add('hidden');
              icon.style.transform = 'rotate(0deg)';
          }
      }

      function selectSport(val, label, event) {
          event.stopPropagation();
          document.getElementById('sport-id').value = val;
          document.getElementById('sport-id-display').value = label;
          document.getElementById('sport-id-menu').classList.add('hidden');
          document.getElementById('sport-id-icon').style.transform = 'rotate(0deg)';
          markDirty();
      }

      document.addEventListener('click', (e) => {
          if (!e.target.closest('#sport-id-container')) {
              const menu = document.getElementById('sport-id-menu');
              const icon = document.getElementById('sport-id-icon');
              if (menu && !menu.classList.contains('hidden')) {
                  menu.classList.add('hidden');
                  icon.style.transform = 'rotate(0deg)';
              }
          }
      });

      /* ═══════════════════════════════════════════════
         STATE & BOTTOM SHEET LOGIC
      ═══════════════════════════════════════════════ */
      let isDirty = false;
      function markDirty() { isDirty = true; }

      function handleBackClick() {
          if (isDirty) {
              openBS('save-confirm');
          } else {
              window.location.href = 'home.html';
          }
      }

      function handleCancelClick() {
          if (isDirty) {
              openBS('save-confirm');
          } else {
              window.location.href = 'home.html';
          }
      }

      function discardAndGoHome() {
          window.location.href = 'home.html';
      }

      function saveAndGoHome() {
          closeBS('save-confirm');
          handleSave();
      }

      function openBS(id) {
          document.getElementById('bs-' + id).classList.add('open');
          if (id === 'turf-select') renderTurfs();
      }
      function closeBS(id) {
          document.getElementById('bs-' + id).classList.remove('open');
      }

      /* ═══════════════════════════════════════════════
         TURF SELECTION
      ═══════════════════════════════════════════════ */
      const turfs = [
          { name: 'Fabzia Arena', frequent: true },
          { name: 'Skyline Sports Turf', frequent: false },
          { name: 'Green Park Turf', frequent: true },
          { name: 'Urban Kick Arena', frequent: false },
          { name: 'Olympia Turf', frequent: false },
          { name: 'City Kickers', frequent: true }
      ];
      let selectedTurf = null;

      function renderTurfs() {
          const list = document.getElementById('turf-list');
          const searchInput = document.getElementById('turf-search');
          const searchQ = searchInput ? searchInput.value.toLowerCase() : '';
          list.innerHTML = '';
          
          let filteredTurfs = turfs.filter(t => t.name.toLowerCase().includes(searchQ));
          let frequentTurfs = filteredTurfs.filter(t => t.frequent).sort((a,b) => a.name.localeCompare(b.name));
          let otherTurfs = filteredTurfs.filter(t => !t.frequent).sort((a,b) => a.name.localeCompare(b.name));
          
          if (frequentTurfs.length > 0) {
              const head = document.createElement('div');
              head.className = 'px-3 py-2 text-[13px] font-semibold text-app-sub uppercase tracking-wider font-inter';
              head.innerText = 'Frequently Searched';
              list.appendChild(head);
              frequentTurfs.forEach(t => list.appendChild(createTurfEl(t.name)));
          }
          if (otherTurfs.length > 0) {
              const head = document.createElement('div');
              head.className = 'px-3 py-2 text-[13px] font-semibold text-app-sub uppercase tracking-wider mt-2 font-inter';
              head.innerText = 'All Turfs';
              list.appendChild(head);
              otherTurfs.forEach(t => list.appendChild(createTurfEl(t.name)));
          }
          if (filteredTurfs.length === 0) {
              list.innerHTML = `<div class="p-4 text-center text-app-placeholder text-[14px] font-inter">No turfs found</div>`;
          }
      }

      function createTurfEl(turfName) {
          const isSelected = selectedTurf === turfName;
          const el = document.createElement('div');
          el.className = 'flex items-center justify-between px-3 py-3 hover:bg-gray-50 cursor-pointer rounded-lg mb-1';
          el.onclick = () => {
              selectedTurf = turfName;
              markDirty();
              const display = document.getElementById('turf-display');
              display.value = selectedTurf;
              closeBS('turf-select');
          };
          el.innerHTML = `
              <span class="text-[15px] text-app-text font-medium font-roboto">${turfName}</span>
              <div class="check-box ${isSelected ? 'active' : ''}">
                  ${isSelected ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white"><path d="M20 6 9 17l-5-5"/></svg>' : ''}
              </div>
          `;
          return el;
      }

      /* ═══════════════════════════════════════════════
         VALIDATE
      ═══════════════════════════════════════════════ */
      function validate() {
        const turf      = document.getElementById("turf-display").value.trim();
        const sport     = document.getElementById("sport-id").value;
        const length    = document.getElementById("field-length").value.trim();
        const width     = document.getElementById("field-width").value.trim();
        const player    = document.getElementById("field-playerAside").value.trim();
        const parentRef = document.getElementById("field-parentRef").value.trim();
        const divSide   = document.getElementById("field-divSideType").value.trim();
        const divPrio   = document.getElementById("field-divPriority").value.trim();
        const divImg    = document.getElementById("field-divImageUrl").value.trim();

        if (!turf)      { showToast("Please select Turf.");                    return false; }
        if (!sport)     { showToast("Please select Sport.");                   return false; }
        if (!length)    { showToast("Please enter Length.");                   return false; }
        if (!width)     { showToast("Please enter Width.");                    return false; }
        if (!player)    { showToast("Please enter PlayerAside.");              return false; }
        if (!parentRef) { showToast("Please enter Parent Unique Reference.");  return false; }
        if (!divSide)   { showToast("Please enter Division Side Type.");       return false; }
        if (!divPrio)   { showToast("Please enter Division Priority Sequence.");return false; }
        if (!divImg)    { showToast("Please enter Division Image url.");       return false; }
        return true;
      }

      /* ═══════════════════════════════════════════════
         SAVE
      ═══════════════════════════════════════════════ */
      function handleSave() {
        if (!validate()) return;

        const payload = {
          turf:      document.getElementById("turf-display").value.trim(),
          sportId:   document.getElementById("sport-id").value,
          length:    document.getElementById("field-length").value.trim(),
          width:     document.getElementById("field-width").value.trim(),
          playerAside: document.getElementById("field-playerAside").value.trim(),
          parentUniqueReference: document.getElementById("field-parentRef").value.trim(),
          divisionSideType: document.getElementById("field-divSideType").value.trim(),
          divisionPriority: document.getElementById("field-divPriority").value.trim(),
          divisionImageUrl: document.getElementById("field-divImageUrl").value.trim(),
        };

        console.log("Map Turf Sports with Division payload:", payload);
        showToast("Mapped successfully!");
        
        setTimeout(() => {
            window.location.href = 'home.html';
        }, 800);
      }
    </script>
  </body>
</html>

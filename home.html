<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Home – Fabzia Admin App</title>
    <meta name="description" content="Fabzia Admin App home screen – access all admin tools from one place." />

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Utility CSS (design tokens) -->
    <link rel="stylesheet" href="utility.css" />

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              "app-bg":          "#f2f4f7",
              "app-heading":     "#1a1a1a",
              "app-text":        "#1a1a1a",
              "app-sub":         "#6b7280",
              "app-placeholder": "#ababab",
              "app-border":      "#e5e7eb",
              "app-icon":        "#4d4d4d",
              "app-btn":         "#125dcd",
            },
            fontFamily: {
              inter: ["Inter", "sans-serif"],
            },
          },
        },
      };
    </script>

    <style>
      /* ── Scrollbar hide ── */
      .scrollbar-hide::-webkit-scrollbar { display: none; }
      .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

      /* ── Row tap feedback ── */
      .nav-row {
        transition: background 0.1s ease;
        -webkit-tap-highlight-color: transparent;
      }
      .nav-row:active { background: #f0f0f0; }

      /* ── Disabled row ── */
      .nav-row-disabled {
        -webkit-tap-highlight-color: transparent;
        cursor: default;
      }

      /* ── Icon circle ── */
      .icon-circle {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      /* ── Section group card ── */
      .section-card {
        background: #ffffff;
        border-radius: 14px;
        overflow: hidden;
        border: 1px solid #e5e7eb;
      }

      /* ── Divider (skip on last row) ── */
      .row-divider {
        height: 1px;
        background: #f0f0f0;
        margin-left: 60px;
        margin-right: 0;
      }

      /* ── Section label ── */
      .section-label {
        font-family: 'Inter', sans-serif;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.6px;
        text-transform: uppercase;
        color: #6b7280;
        padding: 0 4px;
        margin-bottom: 6px;
      }
    </style>
  </head>

  <body class="flex justify-center min-h-screen" style="background:#f2f4f7">
    <div id="app" class="w-full max-w-[430px] min-h-screen flex flex-col">

      <!-- ── Top Nav ── -->
      <div class="sticky top-0 z-30 bg-white border-b border-[#e5e7eb]">
        <div class="flex items-center gap-3 px-4 h-[60px]">
          <!-- Logo mark -->
          <div class="w-8 h-8 rounded-[8px] bg-[#125dcd] flex items-center justify-center shrink-0">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <polyline points="9 22 9 12 15 12 15 22" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div>
            <p class="font-inter text-[15px] font-semibold text-[#1a1a1a] leading-tight">Fabzia Admin</p>
            <p class="font-inter text-[11px] text-[#6b7280] leading-tight">Control Panel</p>
          </div>
        </div>
      </div>

      <!-- ── Scrollable Content ── -->
      <div class="flex flex-col gap-5 px-4 pt-5 pb-10 overflow-y-auto scrollbar-hide">

        <!-- ─── Section: User & Content ─── -->
        <div>
          <p class="section-label">User &amp; Content</p>
          <div class="section-card">

            <!-- Add User -->
            <a id="nav-add-user" href="addUser.html" class="nav-row flex items-center gap-3 px-4 py-[13px] no-underline">
              <div class="icon-circle" style="background:#eef3fc">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" stroke="#125dcd" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                  <circle cx="12" cy="7" r="4" stroke="#125dcd" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
              <span class="flex-1 font-inter text-[15px] font-medium text-[#1a1a1a]">Add User</span>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M9 18l6-6-6-6" stroke="#b0b0b0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </a>

            <div class="row-divider"></div>

            <!-- List Username -->
            <a id="nav-list-username" href="manageUsers.html" class="nav-row flex items-center gap-3 px-4 py-[13px] no-underline">
              <div class="icon-circle" style="background:#f3f0ff">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                  <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" stroke="#7c3aed" stroke-width="1.8" stroke-linecap="round"/>
                  <circle cx="9" cy="7" r="4" stroke="#7c3aed" stroke-width="1.8"/>
                  <path d="M23 21v-2a4 4 0 0 0-3-3.87" stroke="#7c3aed" stroke-width="1.8" stroke-linecap="round"/>
                  <path d="M16 3.13a4 4 0 0 1 0 7.75" stroke="#7c3aed" stroke-width="1.8" stroke-linecap="round"/>
                </svg>
              </div>
              <span class="flex-1 font-inter text-[15px] font-medium text-[#1a1a1a]">List UserName</span>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M9 18l6-6-6-6" stroke="#b0b0b0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </a>

            <div class="row-divider"></div>

            <!-- Add Coaching -->
            <a id="nav-add-coaching" href="addCoaching.html" class="nav-row flex items-center gap-3 px-4 py-[13px] no-underline">
              <div class="icon-circle" style="background:#fff3ec">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                  <path d="M12 20h9" stroke="#f97316" stroke-width="1.8" stroke-linecap="round"/>
                  <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" stroke="#f97316" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
              <span class="flex-1 font-inter text-[15px] font-medium text-[#1a1a1a]">Add Coaching</span>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M9 18l6-6-6-6" stroke="#b0b0b0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </a>

          </div>
        </div>

        <!-- ─── Section: Turf Management ─── -->
        <div>
          <p class="section-label">Turf Management</p>
          <div class="section-card">

            <!-- Add Turf -->
            <a id="nav-add-turf" href="addTurf.html" class="nav-row flex items-center gap-3 px-4 py-[13px] no-underline">
              <div class="icon-circle" style="background:#edfdf3">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                  <rect x="3" y="3" width="18" height="18" rx="3" stroke="#16a34a" stroke-width="1.8"/>
                  <path d="M12 8v8M8 12h8" stroke="#16a34a" stroke-width="1.8" stroke-linecap="round"/>
                </svg>
              </div>
              <span class="flex-1 font-inter text-[15px] font-medium text-[#1a1a1a]">Add Turf</span>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M9 18l6-6-6-6" stroke="#b0b0b0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </a>

            <div class="row-divider"></div>

            <!-- Add Sports (coming soon) -->
            <div id="nav-add-sports" class="nav-row-disabled flex items-center gap-3 px-4 py-[13px] opacity-40">
              <div class="icon-circle" style="background:#fef3f2">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                  <circle cx="12" cy="12" r="9" stroke="#ef4444" stroke-width="1.8"/>
                  <path d="M12 3c3 3 3 9 0 18M12 3c-3 3-3 9 0 18M3 12h18" stroke="#ef4444" stroke-width="1.8"/>
                </svg>
              </div>
              <span class="flex-1 font-inter text-[15px] font-medium text-[#1a1a1a]">Add Sports</span>
              <span class="font-inter text-[11px] font-semibold text-[#9ca3af] bg-[#f3f4f6] rounded-full px-2 py-0.5">Soon</span>
            </div>

            <div class="row-divider"></div>

            <!-- Turf With Sports -->
            <a id="nav-turf-with-sports" href="turfWithSports.html" class="nav-row flex items-center gap-3 px-4 py-[13px] no-underline">
              <div class="icon-circle" style="background:#f3f0ff">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                  <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" stroke="#7c3aed" stroke-width="1.8" stroke-linecap="round"/>
                  <circle cx="9" cy="7" r="4" stroke="#7c3aed" stroke-width="1.8"/>
                  <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75" stroke="#7c3aed" stroke-width="1.8" stroke-linecap="round"/>
                </svg>
              </div>
              <span class="flex-1 font-inter text-[15px] font-medium text-[#1a1a1a]">Turf With Sports</span>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M9 18l6-6-6-6" stroke="#b0b0b0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </a>

            <div class="row-divider"></div>

            <!-- Map Turf Sports with Division -->
            <a id="nav-map-turf-sports" href="mapTurfSportsWithDivision.html" class="nav-row flex items-center gap-3 px-4 py-[13px] no-underline">
              <div class="icon-circle" style="background:#fff8e1">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                  <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6" stroke="#d97706" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                  <line x1="8" y1="2" x2="8" y2="18" stroke="#d97706" stroke-width="1.8"/>
                  <line x1="16" y1="6" x2="16" y2="22" stroke="#d97706" stroke-width="1.8"/>
                </svg>
              </div>
              <span class="flex-1 font-inter text-[15px] font-medium text-[#1a1a1a]">Map Turf &amp; Division</span>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M9 18l6-6-6-6" stroke="#b0b0b0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </a>

            <div class="row-divider"></div>

            <!-- Map User with Turf (coming soon) -->
            <div id="nav-map-user-turf" class="nav-row-disabled flex items-center gap-3 px-4 py-[13px] opacity-40">
              <div class="icon-circle" style="background:#eef3fc">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                  <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" stroke="#125dcd" stroke-width="1.8"/>
                  <circle cx="12" cy="10" r="3" stroke="#125dcd" stroke-width="1.8"/>
                </svg>
              </div>
              <span class="flex-1 font-inter text-[15px] font-medium text-[#1a1a1a]">Map User with Turf</span>
              <span class="font-inter text-[11px] font-semibold text-[#9ca3af] bg-[#f3f4f6] rounded-full px-2 py-0.5">Soon</span>
            </div>

            <div class="row-divider"></div>

            <!-- Add Amenities -->
            <a id="nav-add-amenities" href="addAmenities.html" class="nav-row flex items-center gap-3 px-4 py-[13px] no-underline">
              <div class="icon-circle" style="background:#fdf2f8">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                  <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 1 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" stroke="#db2777" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
              <span class="flex-1 font-inter text-[15px] font-medium text-[#1a1a1a]">Add Amenities</span>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M9 18l6-6-6-6" stroke="#b0b0b0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </a>

          </div>
        </div>

        <!-- ─── Section: Settings & Access ─── -->
        <div>
          <p class="section-label">Settings &amp; Access</p>
          <div class="section-card">

            <!-- Add Promo Code -->
            <a id="nav-add-promo" href="addPromoCode.html" class="nav-row flex items-center gap-3 px-4 py-[13px] no-underline">
              <div class="icon-circle" style="background:#fff8e1">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                  <path d="M20 12V22H4V12" stroke="#d97706" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="M22 7H2v5h20V7z" stroke="#d97706" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="M12 22V7M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7zM12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z" stroke="#d97706" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
              <span class="flex-1 font-inter text-[15px] font-medium text-[#1a1a1a]">Add Promo Code</span>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M9 18l6-6-6-6" stroke="#b0b0b0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </a>

            <div class="row-divider"></div>

            <!-- Access Right (coming soon) -->
            <div id="nav-access-right" class="nav-row-disabled flex items-center gap-3 px-4 py-[13px] opacity-40">
              <div class="icon-circle" style="background:#f0fdf4">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2" stroke="#16a34a" stroke-width="1.8"/>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="#16a34a" stroke-width="1.8" stroke-linecap="round"/>
                </svg>
              </div>
              <span class="flex-1 font-inter text-[15px] font-medium text-[#1a1a1a]">Access Right</span>
              <span class="font-inter text-[11px] font-semibold text-[#9ca3af] bg-[#f3f4f6] rounded-full px-2 py-0.5">Soon</span>
            </div>

          </div>
        </div>

        <!-- Version tag -->
        <p class="text-center font-inter text-[11px] text-[#c0c0c0]">Fabzia Admin · v1.0</p>

      </div><!-- /content -->

    </div><!-- /app -->
  </body>
</html>
